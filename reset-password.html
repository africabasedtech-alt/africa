<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AfricaBased</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #06090f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #0d1b2a;
            border: 1px solid #1a2e45;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo h1 { color: #0a9e8c; font-size: 26px; font-weight: 700; }
        .logo p { color: #8899aa; font-size: 14px; margin-top: 4px; }
        h2 { color: #e0e0e0; font-size: 20px; margin-bottom: 8px; }
        .subtitle { color: #8899aa; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; color: #aabbcc; font-size: 13px; margin-bottom: 6px; }
        input {
            width: 100%;
            background: #0a1628;
            border: 1.5px solid #1a2e45;
            border-radius: 8px;
            padding: 12px 42px 12px 14px;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #0a9e8c; }
        .toggle-pwd {
            position: absolute;
            right: 12px;
            top: 34px;
            background: none;
            border: none;
            color: #8899aa;
            cursor: pointer;
            padding: 4px;
        }
        .toggle-pwd:hover { color: #0a9e8c; }
        .btn {
            width: 100%;
            background: #0a9e8c;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 13px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #089080; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 18px;
            display: none;
        }
        .alert.error { background: rgba(220,53,69,0.15); border: 1px solid rgba(220,53,69,0.4); color: #ff6b7a; }
        .alert.success { background: rgba(10,158,140,0.15); border: 1px solid rgba(10,158,140,0.4); color: #0a9e8c; }
        .invalid-box { text-align: center; padding: 20px 0; }
        .invalid-box i { font-size: 48px; color: #ff6b7a; margin-bottom: 16px; display: block; }
        .invalid-box p { color: #8899aa; margin-bottom: 20px; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #8899aa;
            font-size: 14px;
            text-decoration: none;
        }
        .back-link:hover { color: #0a9e8c; }
    </style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>AfricaBased</h1>
        <p>Investment Platform</p>
    </div>

    <div id="invalidBox" class="invalid-box" style="display:none">
        <i class="fas fa-exclamation-circle"></i>
        <h2>Link Invalid or Expired</h2>
        <p>This password reset link is no longer valid. Please request a new one.</p>
        <a href="/forgot-password" class="btn" style="display:inline-block;text-decoration:none;padding:12px 24px;width:auto">Request New Link</a>
    </div>

    <div id="mainContent">
        <h2>Set New Password</h2>
        <p class="subtitle">Choose a strong password for your account. It must be at least 8 characters. This link expires in <strong style="color:#0a9e8c">5 minutes</strong>.</p>

        <div class="alert error" id="errMsg"></div>
        <div class="alert success" id="successMsg"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="At least 8 characters" required>
                <button type="button" class="toggle-pwd" id="togglePwd1"><i class="fas fa-eye-slash"></i></button>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
                <button type="button" class="toggle-pwd" id="togglePwd2"><i class="fas fa-eye-slash"></i></button>
            </div>
            <button type="submit" class="btn" id="submitBtn">
                <i class="fas fa-lock"></i> Reset Password
            </button>
        </form>
    </div>

    <a href="/login" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('invalidBox').style.display = 'block';
    }

    document.getElementById('togglePwd1').addEventListener('click', function() {
        const inp = document.getElementById('password');
        const icon = this.querySelector('i');
        inp.type = inp.type === 'password' ? 'text' : 'password';
        icon.className = inp.type === 'password' ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    document.getElementById('togglePwd2').addEventListener('click', function() {
        const inp = document.getElementById('confirmPassword');
        const icon = this.querySelector('i');
        inp.type = inp.type === 'password' ? 'text' : 'password';
        icon.className = inp.type === 'password' ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errMsg = document.getElementById('errMsg');
        const successMsg = document.getElementById('successMsg');
        errMsg.style.display = 'none';
        successMsg.style.display = 'none';

        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (password.length < 8) {
            errMsg.textContent = 'Password must be at least 8 characters.';
            errMsg.style.display = 'block';
            return;
        }
        if (password !== confirm) {
            errMsg.textContent = 'Passwords do not match.';
            errMsg.style.display = 'block';
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting…';

        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password })
            });
            const data = await res.json();
            if (!res.ok) {
                if (res.status === 400 && data.error && data.error.includes('invalid or has expired')) {
                    document.getElementById('mainContent').style.display = 'none';
                    document.getElementById('invalidBox').style.display = 'block';
                } else {
                    errMsg.textContent = data.error || 'Something went wrong.';
                    errMsg.style.display = 'block';
                }
            } else {
                successMsg.textContent = data.message + ' Redirecting to login…';
                successMsg.style.display = 'block';
                document.getElementById('resetForm').style.display = 'none';
                setTimeout(() => { window.location.href = '/login'; }, 2500);
            }
        } catch(err) {
            errMsg.textContent = 'Network error. Please check your connection.';
            errMsg.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-lock"></i> Reset Password';
        }
    });
</script>
</body>
</html>
