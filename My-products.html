<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#06090f">
    <link rel="apple-touch-icon" href="/public/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AfricaBased">
    <title>My Investments | AfricaBased</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #06090f;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            padding-top: 60px;
            min-height: 100vh;
        }

        .dashboard-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .dashboard-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .summary-card {
            background: linear-gradient(135deg, #111d2e, #152535);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .investment-card {
            background: linear-gradient(145deg, #111d2e, #0d1520);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .investment-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 25px rgba(0,0,0,0.2);
        }

        .investment-details {
            padding: 20px;
        }

        .investment-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .investment-sector {
            color: #d4a017;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .info-box {
            text-align: center;
        }

        .info-label {
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .info-value {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .earnings-box {
            padding: 15px;
            background: rgba(212,160,23,0.1);
            border-radius: 10px;
            margin-top: 20px;
        }

        .action-btn {
            background: linear-gradient(135deg, #d4a017, #45b8b0);
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .action-btn:disabled {
            background: linear-gradient(135deg, #666, #555);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .action-btn:not(:disabled):hover {
            background: linear-gradient(135deg, #45b8b0, #3ca49d);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212,160,23,0.3);
        }

        .history-toggle {
            background: rgba(212,160,23,0.1);
            border: 1px solid rgba(212,160,23,0.2);
            color: #d4a017;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .history-toggle:hover {
            background: rgba(212,160,23,0.2);
        }

        .collection-history {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .collection-history.open {
            max-height: 500px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }
        .history-item:last-child { border-bottom: none; }
        .history-date { color: #999; }
        .history-amount { color: #2ecc71; font-weight: 600; }

        .total-collected-box {
            background: rgba(46,204,113,0.1);
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-collected-label { color: #999; font-size: 0.85rem; font-weight: 600; }
        .total-collected-value { color: #2ecc71; font-size: 1.1rem; font-weight: 700; }

        @media (max-width: 768px) {
            .dashboard-summary {
                grid-template-columns: 1fr;
            }
            body {
                padding-top: 40px;
            }
        }
    body{padding-bottom:80px !important;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Bottom Tab Bar -->
  <style>
  .ab-tabs{position:fixed;bottom:0;left:0;right:0;height:72px;background:linear-gradient(180deg,#0d1520 0%,#06090f 100%);border-top:1px solid rgba(212,160,23,0.15);display:flex;justify-content:space-around;align-items:center;z-index:9999;padding-bottom:env(safe-area-inset-bottom,0);}
  .ab-tabs a{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:rgba(255,255,255,0.45);font-size:0.65rem;font-family:Poppins,sans-serif;transition:color 0.2s;}
  .ab-tabs a i{font-size:1.15rem;}
  .ab-tabs a.active{color:#d4a017;}
  .ab-tabs a.active i{filter:drop-shadow(0 0 6px rgba(212,160,23,0.5));}
  </style>
</head>
<body>
    <a href="products.html" class="btn action-btn" style="position: fixed; top: 20px; left: 20px; width: auto; z-index: 1000;">
        <i class="fas fa-arrow-left"></i> Back to Products
    </a>
    <div class="container">
        <div class="dashboard-header">
            <h1>My Investments</h1>
        </div>

        <div class="dashboard-summary">
            <div class="summary-card">
                <div class="info-label">Total Invested</div>
                <div class="info-value" id="total-invested">KSH 0.00</div>
            </div>
            <div class="summary-card">
                <div class="info-label">Daily Returns</div>
                <div class="info-value" id="total-daily-returns">KSH 0.00</div>
            </div>
            <div class="summary-card">
                <div class="info-label">Active Investments</div>
                <div class="info-value" id="active-investments">0</div>
            </div>
            <div class="summary-card">
                <div class="info-label">Total Collected</div>
                <div class="info-value" style="color:#2ecc71;" id="total-collected">KSH 0.00</div>
            </div>
        </div>

        <div id="investments-container" class="row g-4"></div>
        <div id="no-investments" style="display: none;">
            <div class="text-center mt-5">
                <i class="fas fa-coins fa-3x mb-3" style="color: #d4a017;"></i>
                <h3>No investments found</h3>
                <p class="text-muted">Start investing to see your products here.</p>
                <a href="products.html" class="action-btn mt-3" style="display: inline-block; max-width: 200px;">
                    Browse Products
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/token.js"></script>
    <script>
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-KE', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount || 0);
        }

        async function toggleHistory(investmentId, btn) {
            const container = document.getElementById('history-' + investmentId);
            if (container.classList.contains('open')) {
                container.classList.remove('open');
                btn.innerHTML = '<i class="fas fa-history me-2"></i>Collection History';
                return;
            }
            container.innerHTML = '<div style="text-align:center;padding:12px;color:#999;font-size:0.85rem;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
            container.classList.add('open');
            btn.innerHTML = '<i class="fas fa-chevron-up me-2"></i>Hide History';
            try {
                const token = window.getABToken();
                const res = await fetch('/api/investments/collections/' + investmentId, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (!data.collections || !data.collections.length) {
                    container.innerHTML = '<div style="text-align:center;padding:16px;color:#666;font-size:0.85rem;"><i class="fas fa-inbox me-2"></i>No collections yet</div>';
                    return;
                }
                let html = '';
                data.collections.forEach(function(c, idx) {
                    const d = new Date(c.collected_at);
                    const dateStr = d.toLocaleDateString('en-KE', { year:'numeric', month:'short', day:'numeric' });
                    const timeStr = d.toLocaleTimeString('en-KE', { hour:'2-digit', minute:'2-digit' });
                    html += '<div class="history-item">' +
                        '<div><span class="history-date">#' + (data.collections.length - idx) + ' &middot; ' + dateStr + ' ' + timeStr + '</span></div>' +
                        '<div class="history-amount">+ KSH ' + formatCurrency(c.amount) + '</div>' +
                    '</div>';
                });
                html += '<div class="history-item" style="background:rgba(46,204,113,0.08);border-radius:8px;margin-top:4px;font-weight:600;">' +
                    '<div style="color:#2ecc71;">Total (' + data.count + ' collections)</div>' +
                    '<div class="history-amount">KSH ' + formatCurrency(data.total_collected) + '</div>' +
                '</div>';
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<div style="text-align:center;padding:12px;color:#e74c3c;font-size:0.85rem;">Failed to load history</div>';
            }
        }

        async function collectIncome(investmentId, btn) {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Collecting...';
            try {
                const token = window.getABToken();
                const res = await fetch('/api/investments/collect/' + investmentId, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (!res.ok) {
                    showABToast(data.error || 'Collection failed', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-hand-holding-usd me-2"></i>Collect';
                    return;
                }
                showABModal({ type:'success', title:'Income Collected!', message:'KSH ' + formatCurrency(data.collected) + ' added to your earnings balance.', confirmText:'Great' });
                loadProducts();
            } catch (e) {
                showABToast('Error: ' + e.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-hand-holding-usd me-2"></i>Collect';
            }
        }

        async function loadProducts() {
            const container = document.getElementById('investments-container');
            const noInvestments = document.getElementById('no-investments');
            container.innerHTML = '<div class="col-12 text-center py-5"><i class="fas fa-spinner fa-spin fa-2x" style="color:#d4a017"></i></div>';
            noInvestments.style.display = 'none';

            const token = window.getABToken();
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch('/api/investments', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.status === 401) { window.location.href = 'login.html'; return; }
                const data = await res.json();
                const investments = (data.investments || []).filter(i => i.status === 'active');

                if (!investments.length) {
                    container.innerHTML = '';
                    container.style.display = 'none';
                    noInvestments.style.display = 'block';
                    document.getElementById('total-invested').textContent = 'KSH 0.00';
                    document.getElementById('total-daily-returns').textContent = 'KSH 0.00';
                    document.getElementById('active-investments').textContent = '0';
                    document.getElementById('total-collected').textContent = 'KSH 0.00';
                    return;
                }

                const now = new Date();
                let totalInvested = 0, totalDaily = 0, grandTotalCollected = 0;

                const cards = investments.map(inv => {
                    const amount = parseFloat(inv.amount) || 0;
                    const daily = parseFloat(inv.daily_earnings) || 0;
                    const totalCollected = parseFloat(inv.total_collected) || 0;
                    const collectionCount = parseInt(inv.collection_count) || 0;
                    totalInvested += amount;
                    totalDaily += daily;
                    grandTotalCollected += totalCollected;

                    const startDate = new Date(inv.start_date);
                    const endDate = new Date(inv.end_date);
                    const holdDays = Math.max(1, Math.round((endDate - startDate) / (1000 * 60 * 60 * 24)));
                    const progressPercent = Math.min(Math.round((collectionCount / holdDays) * 100), 100);

                    const lastCollect = inv.last_collected_at ? new Date(inv.last_collected_at) : startDate;
                    const nextCollect = new Date(lastCollect.getTime() + 24 * 60 * 60 * 1000);
                    const isMatured = now >= endDate;
                    const canCollect = !isMatured && now >= nextCollect;

                    const statusBadge = isMatured
                        ? '<span style="color:#ff6b6b;font-size:0.8rem;font-weight:600;">MATURED</span>'
                        : '<span style="color:#d4a017;font-size:0.8rem;font-weight:600;">ACTIVE</span>';

                    const expectedTotal = daily * holdDays;

                    return `
                        <div class="col-md-6 col-lg-4">
                            <div class="investment-card">
                                <div class="investment-details">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <div class="investment-title">${inv.product_name || 'Investment'}</div>
                                        ${statusBadge}
                                    </div>
                                    <div class="investment-sector">
                                        <i class="fas fa-calendar-alt me-2"></i>Started ${startDate.toLocaleDateString('en-KE')}
                                    </div>

                                    <div class="info-grid">
                                        <div class="info-box">
                                            <div class="info-label">Invested</div>
                                            <div class="info-value">KSH ${formatCurrency(amount)}</div>
                                        </div>
                                        <div class="info-box">
                                            <div class="info-label">Daily Returns</div>
                                            <div class="info-value">KSH ${formatCurrency(daily)}</div>
                                        </div>
                                        <div class="info-box">
                                            <div class="info-label">Progress</div>
                                            <div class="info-value">${collectionCount}/${holdDays} days collected</div>
                                        </div>
                                        <div class="info-box">
                                            <div class="info-label">Ends</div>
                                            <div class="info-value" style="font-size:0.95rem;">${endDate.toLocaleDateString('en-KE')}</div>
                                        </div>
                                    </div>

                                    <div class="progress mb-3" style="height: 6px; background: rgba(255,255,255,0.1);">
                                        <div class="progress-bar" role="progressbar"
                                             style="width: ${progressPercent}%; background: #d4a017;"
                                             aria-valuenow="${progressPercent}" aria-valuemin="0" aria-valuemax="100">
                                        </div>
                                    </div>

                                    <div class="total-collected-box">
                                        <div>
                                            <div class="total-collected-label">Total Collected (${collectionCount} times)</div>
                                            <div style="color:#999;font-size:0.75rem;">of KSH ${formatCurrency(expectedTotal)} expected</div>
                                        </div>
                                        <div class="total-collected-value">KSH ${formatCurrency(totalCollected)}</div>
                                    </div>

                                    <div class="earnings-box">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div>
                                                <div class="info-label mb-1">Next Collection</div>
                                                <div class="info-value" style="color: #d4a017; font-size:0.95rem;">
                                                    ${isMatured ? 'Investment matured' : canCollect ? 'Available Now' : nextCollect.toLocaleTimeString('en-KE')}
                                                </div>
                                            </div>
                                            <button onclick="collectIncome('${inv.id}', this)"
                                                    class="action-btn"
                                                    style="width: auto; min-width: 110px;"
                                                    ${!canCollect ? 'disabled' : ''}>
                                                <i class="fas fa-hand-holding-usd me-2"></i>Collect
                                            </button>
                                        </div>
                                    </div>

                                    <button class="history-toggle" onclick="toggleHistory('${inv.id}', this)">
                                        <i class="fas fa-history me-2"></i>Collection History
                                    </button>
                                    <div class="collection-history" id="history-${inv.id}">
                                        <div style="text-align:center;padding:12px;color:#999;font-size:0.85rem;">
                                            <i class="fas fa-spinner fa-spin"></i> Loading...
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                container.style.display = '';
                container.innerHTML = cards.join('');
                noInvestments.style.display = 'none';

                document.getElementById('total-invested').textContent = 'KSH ' + formatCurrency(totalInvested);
                document.getElementById('total-daily-returns').textContent = 'KSH ' + formatCurrency(totalDaily);
                document.getElementById('active-investments').textContent = investments.length.toString();
                document.getElementById('total-collected').textContent = 'KSH ' + formatCurrency(grandTotalCollected);

            } catch (e) {
                container.innerHTML = '<div class="col-12 text-center py-4 text-danger">Failed to load investments. Please refresh.</div>';
                console.error('Load investments error:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
<script src="/js/impersonation-guard.js"></script>
<script src="/js/ai-assistant.js"></script>
<script src="/js/toast-modal.js"></script>
<script src="/js/pwa.js"></script>

  <a href="/products"><i class="fas fa-chart-line"></i><span>Invest</span></a>
  <a href="/My-products" class="active"><i class="fas fa-wallet"></i><span>Holdings</span></a>
  <a href="/deposit"><i class="fas fa-money-bill-wave"></i><span>Wallet</span></a>
  <a href="/profile"><i class="fas fa-user"></i><span>Profile</span></a>
</nav>
</body>
</html>
