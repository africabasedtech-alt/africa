<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d4a017">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/public/icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/public/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/public/icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/public/icons/icon-192x192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AfricaBased">
  <meta name="msapplication-TileColor" content="#d4a017">
  <meta name="msapplication-TileImage" content="/public/icons/icon-144x144.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/icons/icon-48x48.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/public/icons/icon-192x192.png">
    <title>My Investments | AfricaBased</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/fintech-theme.css">
    <style>
        body {
            background: var(--ft-bg);
            color: var(--ft-text);
            font-family: var(--ft-font);
            padding-top: 24px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .dashboard-header {
            margin-bottom: 24px;
            text-align: left;
        }
        .dashboard-header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .dashboard-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }

        .summary-card {
            background: var(--ft-card);
            border-radius: var(--ft-radius-lg);
            padding: 16px 18px;
            text-align: left;
            border: 1px solid var(--ft-border);
            box-shadow: var(--ft-shadow);
        }

        .investment-card {
            background: var(--ft-card);
            border-radius: var(--ft-radius-lg);
            overflow: hidden;
            box-shadow: var(--ft-shadow);
            transition: var(--ft-transition);
            height: 100%;
            border: 1px solid var(--ft-border);
        }

        .investment-card:hover {
            transform: translateY(-3px);
            border-color: var(--ft-border-hover);
            box-shadow: var(--ft-shadow-lg);
        }

        .investment-details {
            padding: 20px;
        }

        .investment-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--ft-text);
        }

        .investment-sector {
            color: var(--ft-gold);
            font-size: 0.78rem;
            margin-bottom: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
            padding: 14px;
            background: rgba(255,255,255,0.03);
            border-radius: var(--ft-radius-sm);
            border: 1px solid var(--ft-border);
        }

        .info-box {
            text-align: center;
        }

        .info-label {
            color: var(--ft-text-muted);
            font-size: 0.72rem;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            font-weight: 600;
        }

        .info-value {
            color: var(--ft-text);
            font-size: 1.05rem;
            font-weight: 700;
        }

        .earnings-box {
            padding: 14px;
            background: var(--ft-gold-dim);
            border-radius: var(--ft-radius-sm);
            margin-top: 16px;
            border: 1px solid rgba(212,160,23,0.15);
        }

        .action-btn {
            background: var(--ft-gold);
            color: #09090b;
            border: none;
            padding: 11px 20px;
            border-radius: var(--ft-radius-sm);
            width: 100%;
            font-weight: 700;
            font-family: var(--ft-font);
            cursor: pointer;
            transition: var(--ft-transition);
            letter-spacing: 0.02em;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            font-size: 0.88rem;
        }

        .action-btn:disabled {
            background: rgba(255,255,255,0.06);
            color: var(--ft-text-muted);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .action-btn:not(:disabled):hover {
            background: var(--ft-gold-bright);
            transform: translateY(-1px);
        }

        .history-toggle {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--ft-border);
            color: var(--ft-text-secondary);
            padding: 8px 16px;
            border-radius: var(--ft-radius-sm);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: var(--ft-font);
            width: 100%;
            margin-top: 10px;
            transition: var(--ft-transition);
        }
        .history-toggle:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--ft-border-hover);
        }

        .collection-history {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .collection-history.open {
            max-height: 500px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid var(--ft-border);
            font-size: 0.85rem;
        }
        .history-item:last-child { border-bottom: none; }
        .history-date { color: var(--ft-text-muted); }
        .history-amount { color: #22c55e; font-weight: 600; }

        .total-collected-box {
            background: rgba(34,197,94,0.06);
            border: 1px solid rgba(34,197,94,0.15);
            border-radius: var(--ft-radius-sm);
            padding: 12px 16px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-collected-label { color: var(--ft-text-muted); font-size: 0.82rem; font-weight: 600; }
        .total-collected-value { color: #22c55e; font-size: 1.05rem; font-weight: 700; }

        @media (max-width: 768px) {
            .dashboard-summary {
                grid-template-columns: 1fr 1fr;
            }
            body {
                padding-top: 20px;
            }
        }
        @media (max-width: 400px) {
            .dashboard-summary {
                grid-template-columns: 1fr;
            }
        }
    body{padding-bottom:80px !important;}
</style>
  <style>
  .ab-tabs{position:fixed;bottom:0;left:0;right:0;height:var(--ft-tab-h);background:rgba(9,9,11,0.95);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-top:1px solid var(--ft-border);display:flex;justify-content:space-around;align-items:center;z-index:9999;padding-bottom:env(safe-area-inset-bottom,0);}
  .ab-tabs a{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--ft-text-muted);font-size:0.62rem;font-family:var(--ft-font);font-weight:600;transition:var(--ft-transition);position:relative;padding:6px 0;}
  .ab-tabs a i{font-size:1.15rem;}
  .ab-tabs a.active{color:var(--ft-gold);}
  .ab-tabs a.active::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:24px;height:2px;border-radius:2px;background:var(--ft-gold);}
  </style>
</head>
<body>
    <a href="products.html" style="position:sticky;top:12px;left:20px;z-index:1000;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);border:1px solid var(--ft-border);color:var(--ft-text-secondary);padding:8px 16px;border-radius:var(--ft-radius-sm);font-size:0.85rem;font-weight:600;font-family:var(--ft-font);text-decoration:none;transition:var(--ft-transition);margin-bottom:8px;">
        <i class="fas fa-arrow-left"></i> Back to Products
    </a>
    <div class="container">
        <div class="dashboard-header">
            <h1>My Investments</h1>
        </div>

        <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
            <button id="toggleValues" data-testid="button-toggle-values" onclick="toggleHoldingsValues()" style="background:rgba(255,255,255,0.04);border:1px solid var(--ft-border);color:var(--ft-text-secondary);padding:8px 16px;border-radius:var(--ft-radius-sm);cursor:pointer;font-size:0.82rem;font-weight:600;font-family:var(--ft-font);display:flex;align-items:center;gap:6px;transition:var(--ft-transition);">
                <i class="fas fa-eye" id="toggleIcon"></i> <span id="toggleText">Hide Values</span>
            </button>
        </div>
        <div class="dashboard-summary">
            <div class="summary-card">
                <div class="info-label">Total Invested</div>
                <div class="info-value holdings-val" id="total-invested" data-testid="text-total-invested">KSH 0.00</div>
            </div>
            <div class="summary-card">
                <div class="info-label">Daily Returns</div>
                <div class="info-value holdings-val" id="total-daily-returns" data-testid="text-daily-returns">KSH 0.00</div>
            </div>
            <div class="summary-card">
                <div class="info-label">Active Investments</div>
                <div class="info-value" id="active-investments" data-testid="text-active-investments">0</div>
            </div>
            <div class="summary-card">
                <div class="info-label">Total Collected</div>
                <div class="info-value holdings-val" style="color:#2ecc71;" id="total-collected" data-testid="text-total-collected">KSH 0.00</div>
            </div>
        </div>

        <div id="investments-container" class="row g-4"></div>
        <div id="no-investments" style="display: none;">
            <div class="text-center mt-5">
                <i class="fas fa-coins fa-3x mb-3" style="color: #d4a017;"></i>
                <h3>No investments found</h3>
                <p class="text-muted">Start investing to see your products here.</p>
                <a href="products.html" class="action-btn mt-3" style="display: inline-block; max-width: 200px;">
                    Browse Products
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/token.js"></script>
    <script>
        var _holdingsHidden = localStorage.getItem('ab_hide_values') === '1';
        function toggleHoldingsValues() {
            _holdingsHidden = !_holdingsHidden;
            localStorage.setItem('ab_hide_values', _holdingsHidden ? '1' : '0');
            applyHoldingsVisibility();
        }
        function applyHoldingsVisibility() {
            var icon = document.getElementById('toggleIcon');
            var text = document.getElementById('toggleText');
            var els = document.querySelectorAll('.holdings-val');
            var cardVals = document.querySelectorAll('.inv-card-val');
            if (_holdingsHidden) {
                icon.className = 'fas fa-eye-slash';
                text.textContent = 'Show Values';
                els.forEach(function(el) { el.setAttribute('data-real', el.textContent); el.textContent = '******'; });
                cardVals.forEach(function(el) { el.setAttribute('data-real', el.textContent); el.textContent = '***'; });
            } else {
                icon.className = 'fas fa-eye';
                text.textContent = 'Hide Values';
                els.forEach(function(el) { if (el.getAttribute('data-real')) el.textContent = el.getAttribute('data-real'); });
                cardVals.forEach(function(el) { if (el.getAttribute('data-real')) el.textContent = el.getAttribute('data-real'); });
            }
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-KE', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount || 0);
        }

        async function toggleHistory(investmentId, btn) {
            const container = document.getElementById('history-' + investmentId);
            if (container.classList.contains('open')) {
                container.classList.remove('open');
                btn.innerHTML = '<i class="fas fa-history me-2"></i>Collection History';
                return;
            }
            container.innerHTML = '<div style="text-align:center;padding:12px;color:#999;font-size:0.85rem;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
            container.classList.add('open');
            btn.innerHTML = '<i class="fas fa-chevron-up me-2"></i>Hide History';
            try {
                const token = window.getABToken();
                const res = await fetch('/api/investments/collections/' + investmentId, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (!data.collections || !data.collections.length) {
                    container.innerHTML = '<div style="text-align:center;padding:16px;color:#666;font-size:0.85rem;"><i class="fas fa-inbox me-2"></i>No collections yet</div>';
                    return;
                }
                let html = '';
                data.collections.forEach(function(c, idx) {
                    const d = new Date(c.collected_at);
                    const dateStr = d.toLocaleDateString('en-KE', { year:'numeric', month:'short', day:'numeric' });
                    const timeStr = d.toLocaleTimeString('en-KE', { hour:'2-digit', minute:'2-digit' });
                    html += '<div class="history-item">' +
                        '<div><span class="history-date">#' + (data.collections.length - idx) + ' &middot; ' + dateStr + ' ' + timeStr + '</span></div>' +
                        '<div class="history-amount">+ KSH ' + formatCurrency(c.amount) + '</div>' +
                    '</div>';
                });
                html += '<div class="history-item" style="background:rgba(46,204,113,0.08);border-radius:8px;margin-top:4px;font-weight:600;">' +
                    '<div style="color:#2ecc71;">Total (' + data.count + ' collections)</div>' +
                    '<div class="history-amount">KSH ' + formatCurrency(data.total_collected) + '</div>' +
                '</div>';
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<div style="text-align:center;padding:12px;color:#e74c3c;font-size:0.85rem;">Failed to load history</div>';
            }
        }

        async function collectIncome(investmentId, btn) {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Collecting...';
            try {
                const token = window.getABToken();
                const res = await fetch('/api/investments/collect/' + investmentId, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (!res.ok) {
                    showABToast(data.error || 'Collection failed', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-hand-holding-usd me-2"></i>Collect';
                    return;
                }
                if (data.matured) {
                  showABModal({ type:'success', title:'Investment Completed!', message:'KSH ' + formatCurrency(data.collected) + ' collected. All expected returns have been received — this investment is now fully matured!', confirmText:'Awesome' });
                } else {
                  showABModal({ type:'success', title:'Income Collected!', message:'KSH ' + formatCurrency(data.collected) + ' added to your earnings balance.', confirmText:'Great' });
                }
                loadProducts();
            } catch (e) {
                showABToast('Error: ' + e.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-hand-holding-usd me-2"></i>Collect';
            }
        }

        async function loadProducts() {
            const container = document.getElementById('investments-container');
            const noInvestments = document.getElementById('no-investments');
            container.innerHTML = '<div class="col-12 text-center py-5"><i class="fas fa-spinner fa-spin fa-2x" style="color:#d4a017"></i></div>';
            noInvestments.style.display = 'none';

            const token = window.getABToken();
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch('/api/investments', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.status === 401) { window.location.href = 'login.html'; return; }
                const data = await res.json();
                const investments = (data.investments || []).filter(i => i.status === 'active' || i.status === 'matured');

                if (!investments.length) {
                    container.innerHTML = '';
                    container.style.display = 'none';
                    noInvestments.style.display = 'block';
                    document.getElementById('total-invested').textContent = 'KSH 0.00';
                    document.getElementById('total-daily-returns').textContent = 'KSH 0.00';
                    document.getElementById('active-investments').textContent = '0';
                    document.getElementById('total-collected').textContent = 'KSH 0.00';
                    applyHoldingsVisibility();
                    return;
                }

                const now = new Date();
                let totalInvested = 0, totalDaily = 0, grandTotalCollected = 0;

                const cards = investments.map(inv => {
                    const amount = parseFloat(inv.amount) || 0;
                    const daily = parseFloat(inv.daily_earnings) || 0;
                    const totalCollected = parseFloat(inv.total_collected) || 0;
                    const collectionCount = parseInt(inv.collection_count) || 0;
                    totalInvested += amount;
                    if (inv.status === 'active') totalDaily += daily;
                    grandTotalCollected += totalCollected;

                    const startDate = new Date(inv.start_date);
                    const endDate = new Date(inv.end_date);
                    const holdDays = Math.max(1, Math.round((endDate - startDate) / (1000 * 60 * 60 * 24)));
                    const expectedTotal = daily * holdDays;
                    const progressPercent = expectedTotal > 0
                        ? Math.min(Math.round((totalCollected / expectedTotal) * 100), 100)
                        : Math.min(Math.round((collectionCount / holdDays) * 100), 100);

                    const lastCollect = inv.last_collected_at ? new Date(inv.last_collected_at) : startDate;
                    const nextCollect = new Date(lastCollect.getTime() + 24 * 60 * 60 * 1000);
                    const isMatured = inv.status === 'matured' || (expectedTotal > 0 && totalCollected >= expectedTotal);
                    const canCollect = !isMatured && now >= nextCollect;

                    const statusBadge = isMatured
                        ? '<span style="color:#4CAF50;font-size:0.8rem;font-weight:600;">COMPLETED</span>'
                        : '<span style="color:#d4a017;font-size:0.8rem;font-weight:600;">ACTIVE</span>';

                    return `
                        <div class="col-md-6 col-lg-4">
                            <div class="investment-card">
                                <div class="investment-details">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <div class="investment-title">${inv.product_name || 'Investment'}</div>
                                        ${statusBadge}
                                    </div>
                                    <div class="investment-sector">
                                        <i class="fas fa-calendar-alt me-2"></i>Started ${startDate.toLocaleDateString('en-KE')}
                                    </div>

                                    <div class="info-grid">
                                        <div class="info-box">
                                            <div class="info-label">Invested</div>
                                            <div class="info-value inv-card-val">KSH ${formatCurrency(amount)}</div>
                                        </div>
                                        <div class="info-box">
                                            <div class="info-label">Daily Returns</div>
                                            <div class="info-value inv-card-val">KSH ${formatCurrency(daily)}</div>
                                        </div>
                                        <div class="info-box">
                                            <div class="info-label">Progress</div>
                                            <div class="info-value">${collectionCount}/${holdDays} days collected</div>
                                        </div>
                                        <div class="info-box">
                                            <div class="info-label">Collected / Expected</div>
                                            <div class="info-value" style="font-size:0.88rem;color:${isMatured ? '#4CAF50' : '#d4a017'}">KSH ${formatCurrency(totalCollected)} / ${formatCurrency(expectedTotal)}</div>
                                        </div>
                                    </div>

                                    <div class="progress mb-3" style="height: 6px; background: rgba(255,255,255,0.1);">
                                        <div class="progress-bar" role="progressbar"
                                             style="width: ${progressPercent}%; background: ${isMatured ? '#4CAF50' : '#d4a017'};"
                                             aria-valuenow="${progressPercent}" aria-valuemin="0" aria-valuemax="100">
                                        </div>
                                    </div>

                                    <div class="total-collected-box">
                                        <div>
                                            <div class="total-collected-label">Total Collected (${collectionCount} times)</div>
                                            <div style="color:#999;font-size:0.75rem;">of KSH ${formatCurrency(expectedTotal)} expected</div>
                                        </div>
                                        <div class="total-collected-value">KSH ${formatCurrency(totalCollected)}</div>
                                    </div>

                                    <div class="earnings-box">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <div>
                                                <div class="info-label mb-1">Next Collection</div>
                                                <div class="info-value" style="color: #d4a017; font-size:0.95rem;">
                                                    ${isMatured ? 'All returns collected ✓' : canCollect ? 'Available Now' : nextCollect.toLocaleTimeString('en-KE')}
                                                </div>
                                            </div>
                                            <button onclick="collectIncome('${inv.id}', this)"
                                                    class="action-btn"
                                                    style="width: auto; min-width: 110px;"
                                                    ${!canCollect ? 'disabled' : ''}>
                                                <i class="fas fa-hand-holding-usd me-2"></i>Collect
                                            </button>
                                        </div>
                                    </div>

                                    <button class="history-toggle" onclick="toggleHistory('${inv.id}', this)">
                                        <i class="fas fa-history me-2"></i>Collection History
                                    </button>
                                    <div class="collection-history" id="history-${inv.id}">
                                        <div style="text-align:center;padding:12px;color:#999;font-size:0.85rem;">
                                            <i class="fas fa-spinner fa-spin"></i> Loading...
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                container.style.display = '';
                container.innerHTML = cards.join('');
                noInvestments.style.display = 'none';

                document.getElementById('total-invested').textContent = 'KSH ' + formatCurrency(totalInvested);
                document.getElementById('total-daily-returns').textContent = 'KSH ' + formatCurrency(totalDaily);
                document.getElementById('active-investments').textContent = investments.length.toString();
                document.getElementById('total-collected').textContent = 'KSH ' + formatCurrency(grandTotalCollected);

                applyHoldingsVisibility();
            } catch (e) {
                container.innerHTML = '<div class="col-12 text-center py-4 text-danger">Failed to load investments. Please refresh.</div>';
                console.error('Load investments error:', e);
            }
        }

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
<script src="/js/impersonation-guard.js"></script>
<script src="/js/ai-assistant.js"></script>
<script src="/js/toast-modal.js"></script>
<script src="/js/pwa.js"></script>
<nav class="ab-tabs">
  <a href="/home"><i class="fas fa-house-chimney"></i><span>Home</span></a>
  <a href="/products"><i class="fas fa-arrow-trend-up"></i><span>Invest</span></a>
  <a href="/My-products" class="active"><i class="fas fa-cubes-stacked"></i><span>Holdings</span></a>
  <a href="/deposit"><i class="fas fa-vault"></i><span>Wallet</span></a>
  <a href="/profile"><i class="fas fa-circle-user"></i><span>My</span></a>
</nav>
</body>
</html>
