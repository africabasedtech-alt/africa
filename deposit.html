<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

  <meta name="theme-color" content="#d4a017">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/public/icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/public/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/public/icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/public/icons/icon-192x192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta name="msapplication-TileImage" content="/public/icons/icon-144x144.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/icons/icon-48x48.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/public/icons/icon-192x192.png">
    <title>AfricaBased - Deposit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/fintech-theme.css">
<script src="/js/theme.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--ft-font); }
        body { background: var(--ft-bg); color: var(--ft-text); min-height: 100vh; padding-top: 20px; padding-bottom: 90px !important; -webkit-font-smoothing: antialiased; }

        .container { max-width: 700px; margin: 0 auto; padding: 32px 20px 60px; }

        .back-link {
            display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
            color: var(--ft-text-secondary); font-size: 0.85rem; font-weight: 600;
            padding: 8px 16px; background: var(--ft-glass); border: 1px solid var(--ft-border);
            border-radius: var(--ft-radius-sm); margin-bottom: 1.2rem; transition: var(--ft-transition);
        }
        .back-link:hover { background: var(--ft-btn-secondary-bg); border-color: var(--ft-border-hover); }

        .page-title {
            font-size: 1.5rem; font-weight: 800; color: var(--ft-text);
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
            letter-spacing: -0.02em;
        }
        .page-title i { color: var(--ft-gold); }

        .search-state {
            text-align: center; padding: 48px 20px;
        }
        .search-ring {
            width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 20px;
            border: 3px solid rgba(212,160,23,0.15); border-top-color: var(--ft-gold);
            animation: spinRing 1s linear infinite;
        }
        @keyframes spinRing { to { transform: rotate(360deg); } }
        .search-text { font-size: 0.95rem; color: var(--ft-text-secondary); }
        .search-sub { font-size: 0.78rem; color: var(--ft-text-muted); margin-top: 6px; }

        .mode-pill {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 700;
            margin-bottom: 18px; font-family: var(--ft-font);
        }
        .mode-pill.auto { background: var(--ft-gold-dim); color: var(--ft-gold); border: 1px solid rgba(212,160,23,0.2); }
        .mode-pill.manual { background: var(--ft-gold-dim); color: var(--ft-gold); border: 1px solid rgba(212,160,23,0.2); }

        .channel-found {
            background: var(--ft-card);
            border: 1px solid var(--ft-border); border-radius: var(--ft-radius-lg);
            overflow: hidden; margin-bottom: 20px;
            animation: fadeUp 0.5s ease;
            box-shadow: var(--ft-shadow);
        }
        @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

        .channel-header {
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--ft-border);
            padding: 20px 22px; display: flex; align-items: center; gap: 14px;
        }
        .channel-icon-lg {
            width: 52px; height: 52px; border-radius: var(--ft-radius-sm); display: flex;
            align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0;
            background: var(--ft-gold-dim); color: var(--ft-gold);
        }
        .channel-meta h3 { font-size: 1rem; font-weight: 700; color: var(--ft-text); }
        .channel-meta .ch-type {
            font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px;
            color: var(--ft-gold); font-weight: 700; margin-top: 2px;
        }

        .channel-number-box {
            margin: 18px 22px; padding: 16px 18px; border-radius: var(--ft-radius-sm);
            background: rgba(255,255,255,0.03); border: 1px solid var(--ft-border);
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .ch-num-label { font-size: 0.72rem; color: var(--ft-text-muted); margin-bottom: 4px; }
        .ch-num-value { font-size: 1.25rem; font-weight: 800; color: var(--ft-gold-bright); letter-spacing: 1px; font-family: 'Courier New', monospace; }
        .copy-btn {
            background: var(--ft-gold-dim); border: 1px solid rgba(212,160,23,0.2);
            color: var(--ft-gold); padding: 8px 16px; border-radius: var(--ft-radius-sm);
            font-size: 0.78rem; font-weight: 700; cursor: pointer; white-space: nowrap;
            display: flex; align-items: center; gap: 5px; transition: var(--ft-transition); font-family: var(--ft-font);
        }
        .copy-btn:hover { background: rgba(212,160,23,0.18); }
        .copy-btn.copied { background: rgba(212,160,23,0.25); color: var(--ft-gold-bright); }

        .channel-account-box {
            margin: 0 22px 18px; padding: 12px 18px; border-radius: var(--ft-radius-sm);
            background: rgba(255,255,255,0.03); border: 1px solid var(--ft-border);
        }
        .acct-label { font-size: 0.72rem; color: var(--ft-text-muted); }
        .acct-value { font-size: 0.95rem; font-weight: 700; color: var(--ft-text); margin-top: 2px; }

        .channel-instructions {
            margin: 0 22px 22px; padding: 18px 20px; border-radius: var(--ft-radius-sm);
            background: rgba(255,255,255,0.02); border: 1px solid var(--ft-border);
        }
        .instr-title-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
            color: var(--ft-gold); font-size: 0.85rem; font-weight: 700;
        }
        .instr-steps { font-size: 0.85rem; color: rgba(255,255,255,0.7); line-height: 1.8; }
        .instr-steps ol { margin: 0; padding-left: 20px; list-style: decimal; }
        .instr-steps ol li { margin-bottom: 6px; }
        .instr-steps p { margin: 0 0 6px; }

        .deposit-card {
            background: var(--ft-card); border-radius: var(--ft-radius-lg);
            box-shadow: var(--ft-shadow); border: 1px solid var(--ft-border); overflow: hidden;
        }

        #depositFrame { width: 100%; min-height: 540px; border: none; background: transparent; display: block; }

        .no-channel-msg {
            text-align: center; padding: 32px 20px;
            color: rgba(255,255,255,0.4); font-size: 0.88rem;
        }
        .no-channel-msg i { font-size: 2rem; color: rgba(255,255,255,0.1); margin-bottom: 12px; display: block; }

        .ab-tabs{position:fixed;bottom:0;left:0;right:0;height:var(--ft-tab-h);background:var(--ft-tab-bg);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-top:1px solid var(--ft-border);display:flex;justify-content:space-around;align-items:center;z-index:9999;padding-bottom:env(safe-area-inset-bottom,0);}
        .ab-tabs a{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;color:var(--ft-text-muted);font-size:0.62rem;font-family:var(--ft-font);font-weight:600;transition:var(--ft-transition);position:relative;padding:6px 0;}
        .ab-tabs a i{font-size:1.15rem;}
        .ab-tabs a.active{color:var(--ft-gold);}
        .ab-tabs a.active::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:24px;height:2px;border-radius:2px;background:var(--ft-gold);}
    </style>
</head>
<body>
    <main class="container">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem">
            <a href="/home" class="back-link" style="margin-bottom:0"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <button class="ft-theme-toggle" onclick="abToggleTheme()" title="Toggle theme"><i class="fas fa-sun"></i></button>
        </div>
        <div class="page-title"><i class="fas fa-arrow-down-to-line"></i> Deposit Funds</div>

        <div id="searchState" class="search-state">
            <div class="search-ring"></div>
            <div class="search-text" data-testid="text-search-status">Looking for deposit channel...</div>
            <div class="search-sub">Finding the best payment option for you</div>
        </div>

        <div id="depositContent" style="display:none;">
            <div id="modePill" style="display:none;" class="mode-pill auto">
                <i class="fas fa-circle" style="font-size:0.5rem;"></i>
                <span id="modePillText"></span>
            </div>

            <div id="channelDisplay" style="display:none;"></div>

            <div class="deposit-card" id="depositCard">
                <iframe id="depositFrame" src="" style="display:none;" allowtransparency="true"></iframe>
            </div>
        </div>
    </main>

    <script>
        function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function getChannelIcon(type) {
            var icons = { mpesa:'fa-mobile-alt', till:'fa-store', paybill:'fa-file-invoice-dollar', bank:'fa-university', other:'fa-ellipsis-h' };
            return icons[type] || icons.other;
        }

        function getTypeLabel(type) {
            var labels = { mpesa:'M-Pesa Send Money', till:'Till Number (Buy Goods)', paybill:'Paybill (Pay Bill)', bank:'Bank Transfer', other:'Payment Channel' };
            return labels[type] || type;
        }

        function getNumLabel(type) {
            var labels = { mpesa:'M-Pesa Number', till:'Till Number', paybill:'Business Number', bank:'Account Number', other:'Payment Number' };
            return labels[type] || 'Number';
        }

        function formatInstructions(text) {
            var lines = text.split(/\r?\n/).map(function(l){return l.trim()}).filter(Boolean);
            if (!lines.length) return '';
            var numberedCount = lines.filter(function(l){return /^\d+[\.\)]\s/.test(l)}).length;
            var isListy = numberedCount >= Math.floor(lines.length * 0.5);
            if (isListy) {
                var items = lines.map(function(l){return '<li>'+esc(l.replace(/^\d+[\.\)]\s+/,''))+'</li>'}).join('');
                return '<ol>'+items+'</ol>';
            }
            return lines.map(function(l){return '<p>'+esc(l)+'</p>'}).join('');
        }

        function copyNumber(num) {
            navigator.clipboard.writeText(num).then(function() {
                var btn = document.getElementById('copyBtn');
                if (btn) {
                    btn.classList.add('copied');
                    btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                    setTimeout(function() {
                        btn.classList.remove('copied');
                        btn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                    }, 2000);
                }
            });
        }

        async function initDeposit() {
            var searchEl = document.getElementById('searchState');
            var contentEl = document.getElementById('depositContent');
            var searchText = searchEl.querySelector('.search-text');

            try {
                searchText.textContent = 'Looking for deposit channel...';
                await new Promise(function(r){setTimeout(r,800)});
                searchText.textContent = 'Connecting to payment system...';

                var res = await fetch('/api/deposit/config');
                var cfg = await res.json();
                var mode = cfg.mode || 'auto';

                await new Promise(function(r){setTimeout(r,600)});
                searchText.textContent = mode === 'manual' ? 'Payment channel found!' : 'Auto deposit ready!';
                await new Promise(function(r){setTimeout(r,400)});

                searchEl.style.display = 'none';
                contentEl.style.display = 'block';

                var pill = document.getElementById('modePill');
                var pillText = document.getElementById('modePillText');
                pill.style.display = 'inline-flex';

                if (mode === 'manual') {
                    pill.className = 'mode-pill manual';
                    pillText.textContent = 'Manual Deposit Mode';

                    var chDisplay = document.getElementById('channelDisplay');
                    if (cfg.channel) {
                        var ch = cfg.channel;
                        var html = '<div class="channel-found">' +
                            '<div class="channel-header">' +
                                '<div class="channel-icon-lg"><i class="fas '+getChannelIcon(ch.type)+'"></i></div>' +
                                '<div class="channel-meta">' +
                                    '<h3>'+esc(ch.name)+'</h3>' +
                                    '<div class="ch-type">'+esc(getTypeLabel(ch.type))+'</div>' +
                                '</div>' +
                            '</div>' +
                            '<div class="channel-number-box">' +
                                '<div><div class="ch-num-label">'+esc(getNumLabel(ch.type))+'</div>' +
                                '<div class="ch-num-value" data-testid="text-channel-number">'+esc(ch.number)+'</div></div>' +
                                '<button class="copy-btn" id="copyBtn" onclick="copyNumber(\''+esc(ch.number)+'\')" data-testid="button-copy-number"><i class="fas fa-copy"></i> Copy</button>' +
                            '</div>';

                        if (ch.account_name) {
                            html += '<div class="channel-account-box">' +
                                '<div class="acct-label">'+(ch.type==='paybill'?'Account Number':'Account Name')+'</div>' +
                                '<div class="acct-value">'+esc(ch.account_name)+'</div>' +
                            '</div>';
                        }

                        if (ch.instructions) {
                            html += '<div class="channel-instructions">' +
                                '<div class="instr-title-row"><i class="fas fa-list-ol"></i> How to Pay</div>' +
                                '<div class="instr-steps">'+formatInstructions(ch.instructions)+'</div>' +
                            '</div>';
                        }

                        html += '</div>';
                        chDisplay.innerHTML = html;
                        chDisplay.style.display = 'block';
                    } else {
                        chDisplay.innerHTML = '<div class="no-channel-msg"><i class="fas fa-exclamation-triangle"></i>No deposit channels available at the moment.<br>Please contact support for deposit instructions.</div>';
                        chDisplay.style.display = 'block';
                    }
                } else {
                    pill.className = 'mode-pill auto';
                    pillText.textContent = 'Auto Mode — Deposits are credited instantly';
                }

                var frame = document.getElementById('depositFrame');
                frame.src = mode === 'auto' ? 'auto-deposit.html' : 'manual-deposit.html';
                frame.onload = function() {
                    frame.style.display = 'block';
                    try {
                        var body = frame.contentDocument || frame.contentWindow.document;
                        if (body) {
                            var h = body.documentElement.scrollHeight;
                            if (h > 100) frame.style.minHeight = h + 'px';
                        }
                    } catch(e) {}
                };
            } catch(e) {
                searchEl.innerHTML =
                    '<i class="fas fa-exclamation-circle" style="font-size:2rem;color:#f44336;margin-bottom:12px;"></i>' +
                    '<div class="search-text" style="color:#f44336;">Failed to load deposit options</div>' +
                    '<div class="search-sub">Please refresh the page and try again</div>';
            }
        }

        initDeposit();
    </script>
<script src="/js/impersonation-guard.js"></script>
<script src="/js/ai-assistant.js"></script>
<script src="/js/toast-modal.js"></script>
<script src="/js/pwa.js"></script>

  <a href="/home"><i class="fas fa-house-chimney"></i><span>Home</span></a>
  <a href="/products"><i class="fas fa-arrow-trend-up"></i><span>Invest</span></a>
  <a href="/My-products"><i class="fas fa-cubes-stacked"></i><span>Holdings</span></a>
  <a href="/deposit" class="active"><i class="fas fa-vault"></i><span>Wallet</span></a>
  <a href="/profile"><i class="fas fa-circle-user"></i><span>My</span></a>
</nav>
</body>
