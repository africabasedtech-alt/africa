<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#06090f">
    <link rel="apple-touch-icon" href="/public/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AfricaBased">
    <title>Forgot Password - AfricaBased</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/fintech-theme.css">
    <script src="/js/theme.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--ft-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--ft-card);
            border: 1px solid var(--ft-border);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo h1 {
            color: #0a9e8c;
            font-size: 26px;
            font-weight: 700;
        }
        .logo p {
            color: var(--ft-text-muted);
            font-size: 14px;
            margin-top: 4px;
        }
        h2 {
            color: var(--ft-text);
            font-size: 20px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--ft-text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: var(--ft-text-secondary);
            font-size: 13px;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            background: var(--ft-input-bg, rgba(255,255,255,0.05));
            border: 1.5px solid var(--ft-border);
            border-radius: 8px;
            padding: 12px 14px;
            color: var(--ft-text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #0a9e8c; }
        .btn {
            width: 100%;
            background: #0a9e8c;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 13px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #089080; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 18px;
            display: none;
        }
        .alert.error { background: rgba(220,53,69,0.15); border: 1px solid rgba(220,53,69,0.4); color: #ff6b7a; }
        .alert.success { background: rgba(10,158,140,0.15); border: 1px solid rgba(10,158,140,0.4); color: #0a9e8c; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--ft-text-muted);
            font-size: 14px;
            text-decoration: none;
        }
        .back-link:hover { color: #0a9e8c; }
    </style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
    <div class="logo" style="display:flex;flex-direction:column;align-items:center;position:relative">
        <h1>AfricaBased</h1>
        <p>Investment Platform</p>
        <button class="ft-theme-toggle" onclick="abToggleTheme()" title="Toggle theme" style="position:absolute;top:0;right:0"><i class="fas fa-sun"></i></button>
    </div>
    <h2>Forgot Password?</h2>
    <p class="subtitle">Enter the email address linked to your account and we'll send you a password reset link.</p>

    <div class="alert error" id="errMsg"></div>
    <div class="alert success" id="successMsg"></div>

    <form id="forgotForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="btn" id="submitBtn">
            <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>
    </form>

    <a href="/login" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
</div>

<script type="module">
    import { forgotPassword } from './js/api-auth.js';

    const errMsg = document.getElementById('errMsg');
    const successMsg = document.getElementById('successMsg');

    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        errMsg.style.display = 'none';
        successMsg.style.display = 'none';

        const email = document.getElementById('email').value.trim();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending…';

        const { data, error } = await forgotPassword(email);
        if (error) {
            errMsg.textContent = error.message;
            errMsg.style.display = 'block';
        } else {
            successMsg.textContent = data.message;
            successMsg.style.display = 'block';
            document.getElementById('forgotForm').style.display = 'none';
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
    });
</script>
<script src="/js/ai-assistant.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
