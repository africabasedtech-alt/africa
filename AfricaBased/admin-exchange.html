function copyCodeText(btn) {
        var span = btn.closest("td").querySelector(".copy-code-text");
        if (!span) return;
        var text = span.textContent.trim();
        navigator.clipboard.writeText(text).then(function() {
                var orig = btn.innerHTML;
                btn.innerHTML = "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2ecc71\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 18 4 13\"></polyline></svg>";
                setTimeout(function() { btn.innerHTML = orig; }, 1500);
        }).catch(function() {
                var ta = document.createElement("textarea");
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                document.body.removeChild(ta);
        });
}

function showCustomAlert(message, callback) {
        const modal = document.getElementById('customModal');
        const msg = document.getElementById('customModalMessage');
        const okBtn = document.getElementById('customModalOkBtn');
        msg.innerHTML = message;
        okBtn.style.display = 'inline-block';
        document.getElementById('customModalYesBtn').style.display = 'none';
        document.getElementById('customModalNoBtn').style.display = 'none';
        modal.style.display = 'flex';
        okBtn.onclick = function() {
                modal.style.display = 'none';
                if (callback) callback();
        };
}
function showCustomConfirm(message, onYes, onNo) {
        const modal = document.getElementById('customModal');
        const msg = document.getElementById('customModalMessage');
        const yesBtn = document.getElementById('customModalYesBtn');
        const noBtn = document.getElementById('customModalNoBtn');
        msg.innerHTML = message;
        yesBtn.style.display = 'inline-block';
        noBtn.style.display = 'inline-block';
        document.getElementById('customModalOkBtn').style.display = 'none';
        modal.style.display = 'flex';
        yesBtn.onclick = function() {

                if (onYes) onYes();
        };
        noBtn.onclick = function() {
                modal.style.display = 'none';
                if (onNo) onNo();
        };
}
                
// ── Exchange Limit Enforcement ─────────────────────────────────────────────
var exchangeLimitData = { limit: 0, generated: 0, remaining: null, has_limit: false };

function getAdminApiKey() {
    try {
        const d = JSON.parse(localStorage.getItem('adminData') || 'null');
        return d && d.api_key ? d.api_key : '1540568e';
    } catch(e) { return '1540568e'; }
}

async function saveCodesToDB(codes) {
    const key = getAdminApiKey();
    const r = await window.safeRequest('/api/admin/exchange-codes', {
        method: 'POST',
        headers: { 'x-admin-key': key },
        body: JSON.stringify({ codes })
    });
    if (!r.ok) throw new Error(r.error || 'Failed to save codes');
    const data = r.data;
    return data.codes;
}

async function loadExchangeLimit() {
    const apiKey = getAdminApiKey();
    if (!apiKey) return; // super admin has no limit
    const r = await window.safeRequest('/api/admin/exchange-limit', { headers: { 'x-admin-key': apiKey } });
    if (!r.ok) return;
    exchangeLimitData = r.data;
    updateLimitBanner(r.data);
}

function updateLimitBanner(d) {
    const banner = document.getElementById('exchangeLimitBanner');
    if (!d.has_limit) { banner.style.display = 'none'; return; }
    banner.style.display = 'block';
    const pct = Math.min(100, (d.generated / d.limit) * 100);
    const barColor = pct >= 90 ? '#ff6b6b' : pct >= 70 ? '#ffc107' : '#4ecdc4';
    document.getElementById('exLimitBar').style.width = pct + '%';
    document.getElementById('exLimitBar').style.background = barColor;
    document.getElementById('exLimitText').textContent = 'KES ' + d.generated.toLocaleString() + ' of KES ' + d.limit.toLocaleString();
    document.getElementById('exUsedAmt').textContent = d.generated.toLocaleString();
    document.getElementById('exRemainingAmt').textContent = d.remaining.toLocaleString();
}

// Call this before generating any code. Returns true if allowed.
async function checkAndRecordExchange(amountKES) {
    const apiKey = getAdminApiKey();
    if (!apiKey) return true; // super admin, no limit
    if (!exchangeLimitData.has_limit) return true; // unlimited
    const rem = exchangeLimitData.remaining;
    if (amountKES > rem) {
        showCustomAlert('Exchange limit exceeded! You can only generate KES ' + rem.toLocaleString() + ' more. Your limit is KES ' + exchangeLimitData.limit.toLocaleString() + '.');
        return false;
    }
    const r = await window.safeRequest('/api/admin/exchange-usage', {
        method: 'POST',
        headers: { 'x-admin-key': apiKey },
        body: JSON.stringify({ amount: amountKES })
    });
    if (!r.ok) {
        showCustomAlert(r.error || 'Exchange limit exceeded.');
        return false;
    }
    const d = r.data;
    exchangeLimitData.generated = d.generated;
    exchangeLimitData.remaining = d.remaining;
    updateLimitBanner({ ...exchangeLimitData, limit: exchangeLimitData.limit, has_limit: exchangeLimitData.has_limit });
    return true;
}

                // 8-character code generator
                function generate8CharCode(type = 'mixed') {
                        let chars = '';
                        if (type === 'letters') chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
                        else if (type === 'digits') chars = '0123456789';
                        else chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                        let code = '';
                        for (let i = 0; i < 8; i++) {
                                code += chars.charAt(Math.floor(Math.random() * chars.length));
                        }
                        return code;
                }
                function formatDateTime(dt) {
                        if (!dt) return 'N/A';
                        const d = new Date(dt);
                        return d.toLocaleString();
                }
                function getStatus(code) {
                        if (code.deactivated) return 'Deactivated';
                        if (code.used) return 'Used';
                        if (code.type === 'random' && code.redeemed && code.redeemed.length >= code.users) return 'Fully Redeemed';
                        return 'Active';
                }
                function renderCodesTable() {
                        const key = getAdminApiKey();
                        const tbody = document.getElementById('codesTableBody');
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:16px;opacity:0.7;">Loading...</td></tr>';
                        window.safeRequest('/api/admin/exchange-codes', { headers: { 'x-admin-key': key } })
                        .then(r => {
                                if (!r.ok) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#ff6b6b;"></td></tr>'; tbody.querySelector('td').textContent = r.error; return; }
                                const data = r.data || {};
                                const codes = data.codes || [];
                                tbody.innerHTML = '';
                                if (!codes.length) {
                                        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:16px;opacity:0.7;">No codes generated yet.</td></tr>';
                                        return;
                                }
                                codes.forEach(code => {
                                        let redeemedInfo = '';
                                        if (code.redemptions && code.redemptions.length > 0) {
                                                redeemedInfo = '<br><span style="font-size:0.9em;opacity:0.8;">';
                                                code.redemptions.forEach(r => {
                                                        redeemedInfo += 'User: ' + (r.username || r.user_id || 'N/A') + ' | Ksh ' + r.amount + ' | ' + formatDateTime(r.redeemed_at) + '<br>';
                                                });
                                                redeemedInfo += '</span>';
                                        }
                                        let status = code.deactivated ? 'Deactivated' : code.used ? 'Used' : 'Active';
                                        if (code.type === 'random' && code.redemptions && code.users_count && code.redemptions.length > 0 && code.redemptions.length < code.users_count) status = 'Partially Used';
                                        let codeTypeDisplay = code.type === 'single' ? (code.code_type || 'Reward') : code.type === 'random' ? 'Random Codes' : code.type === 'referral' ? 'Referral Reward' : code.type === 'user' ? 'User Assigned' : code.type;
                                        const codeStr = code.code.replace(/^RC-/, '');
                                        const amtDisplay = code.type === 'random' ? 'Pool: Ksh ' + code.pool_amount : 'Ksh ' + (code.amount || '-');
                                        const tr = document.createElement('tr');
                                        tr.innerHTML = `
                                                <td style="position:relative;">
                                                        Redemption code: <span class="copy-code-text">${codeStr}</span>
                                                        <button class="copy-btn" title="Copy code" style="background:none;border:none;cursor:pointer;padding:0 0 0 6px;vertical-align:middle;" onclick="copyCodeText(this)">
                                                                <svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='#ffd54f' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='9' y='9' width='13' height='13' rx='2' ry='2'></rect><path d='M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1'></path></svg>
                                                        </button>
                                                </td>
                                                <td>${codeTypeDisplay}</td>
                                                <td>${amtDisplay}${redeemedInfo}</td>
                                                <td>${formatDateTime(code.expiry)}</td>
                                                <td>${status}</td>
                                                <td>
                                                        <button onclick="deleteCode('${code.id}')">Delete</button>
                                                        <button onclick="toggleCode('${code.id}', this)">${code.deactivated ? 'Activate' : 'Deactivate'}</button>
                                                </td>
                                        `;
                                        tbody.appendChild(tr);
                                });
                        });
                }
                document.getElementById('viewCodesBtn').onclick = function() {
                        document.getElementById('codesTablePanel').style.display = 'block';
                        renderCodesTable();
                };

                function editCode(id) {
                        showCustomAlert('Edit code functionality coming soon.');
                }
                window.deleteCode = function(id) {
                        const key = getAdminApiKey();
                        showCustomConfirm('Delete this code?', function() {
                                window.safeRequest('/api/admin/exchange-codes/' + id, { method: 'DELETE', headers: { 'x-admin-key': key } })
                                .then(r => {
                                        if (!r.ok) { showCustomAlert('Failed to delete: ' + r.error); return; }
                                        renderCodesTable();
                                });
                        });
                };
                window.toggleCode = function(id, btn) {
                        const key = getAdminApiKey();
                        window.safeRequest('/api/admin/exchange-codes/' + id + '/toggle', { method: 'PATCH', headers: { 'x-admin-key': key } })
                        .then(r => {
                                if (!r.ok) { showCustomAlert('Failed: ' + r.error); return; }
                                const data = r.data || {};
                                if (data.code) {
                                        btn.textContent = data.code.deactivated ? 'Activate' : 'Deactivate';
                                        renderCodesTable();
                                }
                        });
                };
                document.getElementById('singleGenSubmit').onclick = async function() {
                        const amount = parseInt(document.getElementById('singleCodeAmount').value);
                        if (isNaN(amount) || amount <= 0) { showCustomAlert('Enter a valid amount.'); return; }
                        if (!await checkAndRecordExchange(amount)) return;
                        const expiry = document.getElementById('singleCodeExpiry').value;
                        const codeType = document.getElementById('singleCodeType').value;
                        const code = 'RC-' + generate8CharCode();
                        try {
                                await saveCodesToDB([{ code, type: 'single', code_type: codeType, amount, expiry: expiry || null }]);
                                let msg = 'Code generated: ' + code + ' for Ksh ' + amount;
                                if (codeType) msg += ' (' + codeType + ')';
                                showCustomAlert(msg);
                                renderCodesTable();
                        } catch(e) { showCustomAlert('Failed: ' + e.message); }
                        document.getElementById('singleGenForm').style.display = 'none';
                };
                document.getElementById('bulkGenSubmit').onclick = async function() {
                        var count = parseInt(document.getElementById('bulkCodeCount').value);
                        var amount = parseInt(document.getElementById('bulkCodeAmount').value);
                        if (isNaN(count) || count <= 0 || isNaN(amount) || amount <= 0) { showCustomAlert('Enter valid count and amount.'); return; }
                        if (!await checkAndRecordExchange(count * amount)) return;
                        var expiry = document.getElementById('bulkCodeExpiry').value;
                        var codeType = document.getElementById('bulkCodeType').value;
                        var codesToSave = [];
                        var generated = [];
                        for (var i = 0; i < count; i++) {
                                var code = 'RC-' + generate8CharCode();
                                codesToSave.push({ code, type: 'single', code_type: codeType, amount, expiry: expiry || null });
                                generated.push(code);
                        }
                        try {
                                await saveCodesToDB(codesToSave);
                                let msg = count + ' codes generated for Ksh ' + amount;
                                if (codeType) msg += ' (' + codeType + ')';
                                msg += ': ' + generated.join(', ');
                                showCustomAlert(msg);
                                renderCodesTable();
                        } catch(e) { showCustomAlert('Failed: ' + e.message); }
                        document.getElementById('bulkGenForm').style.display = 'none';
                };

                document.getElementById('randomGenSubmit').onclick = async function() {
                        var pool = parseInt(document.getElementById('randomPoolAmount').value);
                        if (isNaN(pool) || pool <= 0) { showCustomAlert('Enter a valid pool amount.'); return; }
                        if (!await checkAndRecordExchange(pool)) return;
                        var users = parseInt(document.getElementById('randomUserCount').value);
                        var max = parseInt(document.getElementById('randomMaxAmount').value);
                        var min = parseInt(document.getElementById('randomMinAmount').value);
                        var expiry = document.getElementById('randomCodeExpiry').value;
                        if (min > max || users * min > pool || max > pool) { showCustomAlert('Invalid input. Please check your values.'); return; }
                        var code = 'RC-RAND-' + generate8CharCode();
                        try {
                                await saveCodesToDB([{ code, type: 'random', pool_amount: pool, users_count: users, max_amount: max, min_amount: min, expiry: expiry || null }]);
                                showCustomAlert('Random code generated: ' + code + '. Redeemable by ' + users + ' users for pool Ksh ' + pool);
                                renderCodesTable();
                        } catch(e) { showCustomAlert('Failed: ' + e.message); }
                        document.getElementById('randomGenForm').style.display = 'none';
                };
                document.getElementById('assignCodeSubmit').onclick = async function() {
                        const user = document.getElementById('assignUser').value.trim();
                        const amount = parseInt(document.getElementById('assignAmount').value);
                        const expiry = document.getElementById('assignExpiry').value;
                        if (!user) { showCustomAlert('Please enter a user name or ID.'); return; }
                        const code = 'RC-USER-' + generate8CharCode();
                        try {
                                await saveCodesToDB([{ code, type: 'user', amount, expiry: expiry || null, assigned_to: user }]);
                                showCustomAlert('Code generated and assigned to ' + user + ': ' + code);
                                renderCodesTable();
                        } catch(e) { showCustomAlert('Failed: ' + e.message); }
                        document.getElementById('assignCodePanel').style.display = 'none';
                };

                // --- Reset and Sync Logic ---
                function confirmSystemReset() {
  document.getElementById('resetConfirmModal').style.display = 'flex';
}
function closeAdminModal() {
  document.getElementById('resetConfirmModal').style.display = 'none';
}
function executeSystemReset() {
  const key = document.getElementById('resetSecurityKey').value;
        if (key === '1540568e') {
                // Clear localStorage and reload page
                localStorage.clear();
                sessionStorage.clear();
                location.reload();
        } else {
                showCustomAlert('Incorrect security key.');
        }
}
async function syncChanges() {
  try {
    const syncStatus = document.getElementById('syncStatus');
    const syncProgress = document.getElementById('syncProgress');
    const syncMessage = document.getElementById('syncMessage');
    syncStatus.style.display = 'block';
    syncMessage.textContent = 'Synchronizing changes...';
    // Simulate sync progress
    const steps = ['exchange'];
    for (let i = 0; i < steps.length; i++) {
      syncProgress.style.width = ((i + 1) / steps.length * 100) + '%';
      syncMessage.textContent = `Syncing ${steps[i]}...`;
      await new Promise(resolve => setTimeout(resolve, 500));
    }
    syncMessage.textContent = 'All changes synchronized!';
    setTimeout(() => { syncStatus.style.display = 'none'; }, 2000);
    // Optionally, reload exchange data here
        } catch (error) {
                showCustomAlert('Failed to sync changes. Please try again.');
        }
}

                <script>
                // --- Admin Notification Bar Logic ---
                function renderAdminNotifications() {
                        let notifications = [];
                        try { notifications = JSON.parse(localStorage.getItem('adminDepositNotifications') || '[]'); } catch {}
                        const list = document.getElementById('adminNotificationList');
                        if (!list) return;
                        if (!notifications.length) {
                                list.innerHTML = '<li style="color:#aaa;">No notifications yet.</li>';
                                return;
                        }
                        list.innerHTML = notifications.map(n => {
                                let info = `<strong>${n.number || 'N/A'}</strong> tried to deposit <strong>KES ${n.amount || 'N/A'}</strong>`;
                                if (n.txid) info += ` (TxID: <span style='color:#ffd54f;'>${n.txid}</span>)`;
                                info += ` <span style='font-size:0.95em;color:#aaa;'>[${new Date(n.time).toLocaleString()}]</span>`;
                                return `<li style='margin-bottom:8px;'>${info}</li>`;
                        }).join('');
                }
                renderAdminNotifications();
                setInterval(renderAdminNotifications, 5000);
                </script>
