    <script type="module">
        const AB_TOKEN = getABToken();
        if (!AB_TOKEN) window.location.href = '/login';

        function fmt(n) { return parseFloat(n||0).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

        let _walletBalance = 0;
        let _incomeBalance = 0;

        async function fetchBalance() {
            try {
                const res = await fetch('/api/balance', { headers: { 'Authorization': 'Bearer ' + AB_TOKEN } });
                if (!res.ok) return;
                const d = await res.json();
                _walletBalance = parseFloat(d.wallet_balance || 0);
                _incomeBalance = parseFloat(d.income_balance || d.balance || 0);
                updateBalanceDisplay();
            } catch(e) {}
        }

        function updateBalanceDisplay() {
            const el = document.getElementById('wallet-balance');
            if (el) el.textContent = `KES ${fmt(_walletBalance)}`;
            const el2 = document.getElementById('income-balance');
            if (el2) el2.textContent = `KES ${fmt(_incomeBalance)}`;
        }

        function showMessage(msg, type = 'info') {
            showABToast(msg, type === 'danger' ? 'error' : type === 'warning' ? 'error' : type);
        }

        function showBalanceSourceModal(pricePerUnit, wallet, income, maxUnits) {
            return new Promise((resolve) => {
                const modal = document.getElementById('balanceSourceModal');
                const priceEl = document.getElementById('bsm-price');
                const walletBtn = document.getElementById('bsm-wallet-btn');
                const incomeBtn = document.getElementById('bsm-income-btn');
                const cancelBtn = document.getElementById('bsm-cancel-btn');
                const walletInfo = document.getElementById('bsm-wallet-info');
                const incomeInfo = document.getElementById('bsm-income-info');
                const unitRow = document.getElementById('bsm-unit-row');
                const unitInput = document.getElementById('bsm-units');
                const totalEl = document.getElementById('bsm-total');

                let currentUnits = 1;
                const hasUnits = maxUnits > 0;

                if (hasUnits) {
                    unitRow.style.display = 'flex';
                    unitInput.value = 1;
                    unitInput.max = maxUnits;
                } else {
                    unitRow.style.display = 'none';
                    unitInput.value = 1;
                }

                function updateTotals() {
                    currentUnits = Math.max(1, Math.min(parseInt(unitInput.value) || 1, hasUnits ? maxUnits : 9999));
                    const totalCost = pricePerUnit * currentUnits;
                    priceEl.textContent = `KES ${totalCost.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
                    if (hasUnits && totalEl) totalEl.textContent = `${currentUnits} unit${currentUnits > 1 ? 's' : ''} × KES ${pricePerUnit.toLocaleString()} = KES ${totalCost.toLocaleString()}`;
                    walletInfo.textContent = `Available: KES ${fmt(wallet)}`;
                    incomeInfo.textContent = `Available: KES ${fmt(income)}`;
                    walletBtn.disabled = wallet < totalCost;
                    incomeBtn.disabled = income < totalCost;
                }
                updateTotals();
                unitInput.oninput = updateTotals;

                modal.style.display = 'flex';

                const cleanup = () => { modal.style.display = 'none'; };
                walletBtn.onclick = () => { cleanup(); resolve({ source: 'wallet', units: currentUnits }); };
                incomeBtn.onclick = () => { cleanup(); resolve({ source: 'income', units: currentUnits }); };
                cancelBtn.onclick = () => { cleanup(); resolve(null); };
                modal.addEventListener('click', (e) => { if (e.target === modal) { cleanup(); resolve(null); } }, { once: true });
            });
        }

        function addProductToMyProducts(productData) {
            let myProducts = JSON.parse(localStorage.getItem('myProducts') || '[]');
            
            // Check if user already has this product
            const existingProduct = myProducts.find(p => p.name === productData.name);
            if (existingProduct) {
                showMessage(`You already own ${productData.name}!`, 'error');
                return false;
            }

            // Add the new product
            myProducts.push({
                ...productData,
                investedAt: Date.now(),
                lastCollected: null,
                collectedAmount: 0
            });
            localStorage.setItem('myProducts', JSON.stringify(myProducts));
            return true;
        }

        // UI Functions
        function setupInvestButtons() {
            document.querySelectorAll('.invest-btn').forEach(btn => {
                btn.addEventListener('click', handleInvestClick);
            });
        }

        async function handleInvestClick(event) {
            const btn = event.currentTarget;
            const card = btn.closest('.product-card');
            if (!card) return;

            const productData = extractProductData(card);
            if (!productData) {
                showMessage('Error reading product data', 'error');
                return;
            }

            if (productData.price === 0) {
                btn.disabled = true;
                btn.textContent = 'Activating...';
                try {
                    const res = await fetch('/api/invest', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + AB_TOKEN },
                        body: JSON.stringify({
                            product_name: productData.name,
                            amount: 0,
                            daily_earnings: productData.dailyIncome,
                            hold_period: productData.holdPeriod,
                            balance_source: 'wallet'
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) {
                        showMessage(data.error || 'Failed to activate free product.', 'error');
                    } else {
                        addProductToMyProducts(productData);
                        showMessage('Free product activated! Go to My Products page to collect income.', 'success');
                    }
                } catch(e) {
                    showMessage('Connection error. Please try again.', 'error');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Get Free';
                }
                return;
            }

            const totalUnits = parseInt(card.getAttribute('data-total-units')) || 0;
            const unitsAvail = parseInt(card.getAttribute('data-units-avail'));
            const maxPerUser = parseInt(card.getAttribute('data-max-per-user')) || 1;
            const maxUnits = maxPerUser;

            if (_walletBalance < productData.price && _incomeBalance < productData.price) {
                showMessage(`Insufficient balance.\n\nYou need at least KES ${productData.price.toLocaleString()} for 1 unit.\n\nDeposit Balance: KES ${fmt(_walletBalance)}\nEarnings Balance: KES ${fmt(_incomeBalance)}\n\nPlease deposit funds or earn more income first.`, 'error');
                return;
            }

            const result = await showBalanceSourceModal(productData.price, _walletBalance, _incomeBalance, maxUnits);
            if (!result) return;

            const chosenSource = result.source;
            const chosenUnits = result.units;
            const totalCost = productData.price * chosenUnits;
            const totalDailyEarnings = productData.dailyIncome * chosenUnits;

            btn.disabled = true;
            btn.textContent = 'Investing...';
            try {
                const res = await fetch('/api/invest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + AB_TOKEN },
                    body: JSON.stringify({
                        product_name: productData.name,
                        amount: totalCost,
                        daily_earnings: totalDailyEarnings,
                        hold_period: productData.holdPeriod,
                        balance_source: chosenSource,
                        units: chosenUnits
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    showMessage(data.error || 'Investment failed. Please try again.', 'error');
                    return;
                }
                _walletBalance = parseFloat(data.wallet_balance || 0);
                _incomeBalance = parseFloat(data.income_balance || 0);
                updateBalanceDisplay();
                addProductToMyProducts({ ...productData, units: chosenUnits, price: totalCost, dailyIncome: totalDailyEarnings });
                showMessage(`Investment successful! ${chosenUnits} unit${chosenUnits > 1 ? 's' : ''} purchased. Go to My Products page to collect income.`, 'success');
            } catch(e) {
                showMessage('Connection error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = productData.price === 0 ? 'Get Free' : 'Invest';
            }
        }

        function extractProductData(card) {
            try {
                const name = card.querySelector('.product-title')?.textContent?.trim();
                const sectorEl = card.querySelector('.product-sector');
                const sector = sectorEl ? sectorEl.textContent.replace(/^\s*/, '').trim() : '';
                const image = card.querySelector('.product-image')?.src;
                const description = card.querySelector('.product-desc-top')?.textContent?.trim();
                
                if (!name || !image) {
                    console.error('Missing required product data');
                    return null;
                }
                
                let price = 0, dailyIncome = 0, holdPeriod = 30;
                
                const detailBoxes = card.querySelectorAll('.product-detail-box');
                for (const box of detailBoxes) {
                    const label = box.querySelector('.product-detail-label')?.textContent?.trim();
                    const value = box.querySelector('.product-detail-value')?.textContent?.trim();
                    
                    if (!label || !value) continue;
                    
                    if (label.includes('Price') || label.includes('Investment Required')) {
                        price = value === 'FREE' ? 0 : (parseFloat(value.replace(/[^0-9.]/g, '')) || 0);
                    } else if (label.includes('Daily') || label.includes('Daily Returns')) {
                        dailyIncome = parseFloat(value.replace(/[^0-9.]/g, '')) || 0;
                    } else if (label.includes('Duration')) {
                        holdPeriod = parseInt(value.match(/\d+/)?.[0] || '30');
                    }
                }

                // Validate the extracted data
                if (name === 'Free Product') {
                    price = 0;
                    dailyIncome = 20;
                    holdPeriod = 2;
                } else if (isNaN(price) || isNaN(dailyIncome) || isNaN(holdPeriod)) {
                    console.error('Invalid product data', { price, dailyIncome, holdPeriod });
                    return null;
                }

                return {
                    name,
                    sector,
                    image,
                    description,
                    price,
                    dailyIncome,
                    holdPeriod
                };
            } catch (error) {
                console.error('Error extracting product data:', error);
                return null;
            }
        }

        // Toggle and Filter Functions
        function setupToggleButtons() {
            const showAllBtn = document.getElementById('showAllBtn');
            const showMineBtn = document.getElementById('showMineBtn');

            showAllBtn?.addEventListener('click', () => handleToggleView('all'));
            showMineBtn?.addEventListener('click', () => handleToggleView('mine'));
        }

        function handleToggleView(view) {
            const showAllBtn = document.getElementById('showAllBtn');
            const showMineBtn = document.getElementById('showMineBtn');

            if (view === 'all') {
                showAllBtn.classList.add('btn-primary');
                showAllBtn.classList.remove('btn-outline-primary');
                showMineBtn.classList.remove('btn-primary');
                showMineBtn.classList.add('btn-outline-primary');
            } else {
                showMineBtn.classList.add('btn-primary');
                showMineBtn.classList.remove('btn-outline-primary');
                showAllBtn.classList.remove('btn-primary');
                showAllBtn.classList.add('btn-outline-primary');
            }

            renderProducts(view);
            updateSectorFilter(view);
        }

        function setupSectorFilter() {
            document.querySelectorAll('.sector-btn').forEach(btn => {
                btn.addEventListener('click', handleSectorFilter);
            });
        }

        function handleSectorFilter(event) {
            const sector = event.target.dataset.sector;
            
            document.querySelectorAll('.sector-btn').forEach(btn => {
                btn.classList.toggle('active', btn === event.target);
            });

            document.querySelectorAll('.product-card').forEach(card => {
                const sectorEl = card.querySelector('.product-sector');
                const cardSector = sectorEl ? sectorEl.textContent.replace(/^\s*/, '').trim() : '';
                card.style.display = (sector === 'All' || cardSector === sector) ? 'flex' : 'none';
            });
        }

        function renderProducts(view) {
            const cards = Array.from(document.querySelectorAll('.product-card'));
            const invested = JSON.parse(localStorage.getItem('myProducts') || '[]');

            cards.forEach(card => {
                const title = card.querySelector('.product-title')?.textContent;
                card.style.display = view === 'all' || invested.some(p => p.name === title) ? 'flex' : 'none';
            });
        }

        function updateSectorFilter(view) {
            const filter = document.querySelector('.sector-filter');
            if (filter) {
                filter.style.display = view === 'all' ? 'flex' : 'none';
            }
        }

        async function loadProductsFromDB() {
            try {
                const res = await fetch('/api/products/active');
                if (!res.ok) { document.getElementById('products-loading').textContent = 'Failed to load products.'; return; }
                const data = await res.json();
                const products = data.products || [];
                if (!products.length) { document.getElementById('products-loading').textContent = 'No products available at the moment.'; return; }

                const container = document.getElementById('products-container');
                const filterContainer = document.getElementById('sector-filter-container');

                if (container) {
                    container.innerHTML = products.map(p => {
                        const price = parseFloat(p.price) || 0;
                        const daily = parseFloat(p.daily_return) || 0;
                        const dur = parseInt(p.duration_days) || 30;
                        const limit = parseInt(p.invest_limit) || 0;
                        const taken = parseInt(p.active_investors) || 0;
                        const totalUnits = parseInt(p.total_units) || 0;
                        const unitsSold = parseInt(p.units_sold) || 0;
                        const unitsAvail = totalUnits > 0 ? Math.max(0, totalUnits - unitsSold) : -1;
                        const remaining = limit > 0 ? Math.max(0, limit - taken) : -1;
                        const soldOut = (limit > 0 && remaining <= 0) || (totalUnits > 0 && unitsAvail <= 0);
                        const isFree = price === 0;
                        const sector = p.category || 'General';
                        const img = p.image_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=1a3a22&color=d4a017&size=400`;
                        let badges = '';
                        if (totalUnits > 0) {
                            badges += soldOut
                                ? `<div class="product-limit-badge sold-out"><i class="fas fa-ban"></i> Sold Out</div>`
                                : `<div class="product-limit-badge"><i class="fas fa-cubes"></i> ${unitsAvail} of ${totalUnits} units left</div>`;
                        } else if (limit > 0) {
                            badges += soldOut
                                ? `<div class="product-limit-badge sold-out"><i class="fas fa-ban"></i> Sold Out</div>`
                                : `<div class="product-limit-badge"><i class="fas fa-users"></i> ${remaining} of ${limit} spots left</div>`;
                        }
                        const maxPerUser = parseInt(p.max_units_per_user) || 1;
                        const totalReturn = daily * dur;
                        const roi = price > 0 ? ((totalReturn / price) * 100).toFixed(0) : '∞';
                        return `<div class="product-card${soldOut ? ' sold-out-card' : ''}" data-total-units="${totalUnits}" data-units-avail="${unitsAvail}" data-max-per-user="${maxPerUser}" data-testid="card-product-${p.id || p.name}">
                            <div class="product-image-wrap">
                                <img src="${img}" alt="${p.name}" class="product-image" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=1a3a22&color=d4a017&size=400'">
                                <div class="product-image-overlay"></div>
                                ${badges}
                            </div>
                            <div class="product-info">
                                <div class="product-title">${p.name}</div>
                                <div class="product-sector"><i class="fas fa-layer-group"></i> ${sector}</div>
                                <div class="product-desc product-desc-top">${p.description || ''}</div>
                                <div class="product-details product-details-grid">
                                    <div class="product-detail-box">
                                        <span class="product-detail-label">Price</span>
                                        <span class="product-detail-value">${isFree ? 'FREE' : 'Ksh ' + price.toLocaleString()}</span>
                                    </div>
                                    <div class="product-detail-box">
                                        <span class="product-detail-label">Daily</span>
                                        <span class="product-detail-value" style="color:#2ecc71;">Ksh ${daily.toLocaleString(undefined,{minimumFractionDigits:1,maximumFractionDigits:1})}</span>
                                    </div>
                                    <div class="product-detail-box">
                                        <span class="product-detail-label">Duration</span>
                                        <span class="product-detail-value">${dur} days</span>
                                    </div>
                                    <div class="product-detail-box">
                                        <span class="product-detail-label">ROI</span>
                                        <span class="product-detail-value" style="color:#d4a017;">${roi}%</span>
                                    </div>
                                </div>
                                <button class="invest-btn" data-testid="button-invest-${p.id || p.name}" ${soldOut ? 'disabled style="opacity:0.4;cursor:not-allowed;"' : ''}>${soldOut ? 'Sold Out' : (isFree ? '<i class="fas fa-gift"></i> Get Free' : '<i class="fas fa-bolt"></i> Invest Now')}</button>
                            </div>
                        </div>`;
                    }).join('');
                }

                if (filterContainer) {
                    const cats = [...new Set(products.map(p => p.category).filter(Boolean))];
                    filterContainer.innerHTML = '<button class="sector-btn active" data-sector="All">All</button>' +
                        cats.map(c => `<button class="sector-btn" data-sector="${c}">${c}</button>`).join('');
                }

                setupInvestButtons();
                setupSectorFilter();
                renderProducts('all');
            } catch(e) {
                console.warn('Could not load products from DB:', e.message);
                const loading = document.getElementById('products-loading');
                if (loading) loading.textContent = 'Could not load products. Please refresh.';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await fetchBalance();

                setupToggleButtons();
                setupSectorFilter();
                setupInvestButtons();

                renderProducts('all');
                updateSectorFilter('all');

                await loadProductsFromDB();
            } catch (error) {
                console.error('Error during page initialization:', error);
                showMessage('Error initializing the page. Please refresh and try again.', 'error');
            }
        });
        </script>
