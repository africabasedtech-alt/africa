<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Manuals | AfricaBased Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }
    .topbar { background: #1a1a2e; border-bottom: 1px solid rgba(212,160,23,0.3); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 1.3rem; color: #d4a017; display: flex; align-items: center; gap: 10px; }
    .topbar a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.9rem; }
    .topbar a:hover { color: #d4a017; }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
    .intro { background: rgba(212,160,23,0.08); border: 1px solid rgba(212,160,23,0.2); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; }
    .intro h2 { color: #d4a017; font-size: 1.1rem; margin-bottom: 0.5rem; }
    .intro p { color: rgba(255,255,255,0.6); font-size: 0.88rem; line-height: 1.6; }
    .quick-download { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 1.5rem; margin-bottom: 2rem; }
    .quick-download h3 { font-size: 1rem; color: #d4a017; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
    .quick-download-row { display: flex; gap: 10px; align-items: center; }
    .quick-download select {
      flex: 1; padding: 0.75rem 1rem; background: rgba(255,255,255,0.06); color: #fff;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
      font-family: 'Segoe UI', sans-serif; font-size: 0.9rem;
      outline: none; appearance: none; -webkit-appearance: none;
      background-image: url('data:image/svg+xml;charset=UTF-8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23a1a1aa%22 stroke-width=%222%22%3E%3Cpath d=%22M6 9l6 6 6-6%22/%3E%3C/svg%3E');
      background-repeat: no-repeat; background-position: right 12px center;
      cursor: pointer;
    }
    .quick-download select:focus { border-color: rgba(212,160,23,0.5); }
    .quick-download select option { background: #1a1a2e; color: #fff; }
    .quick-dl-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #d4a017, #b8860b); color: #0f0f1a;
      border: none; border-radius: 8px; padding: 0.75rem 1.5rem;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s; white-space: nowrap;
    }
    .quick-dl-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(212,160,23,0.3); }
    .quick-dl-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .manual-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
    .manual-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 1.5rem; position: relative; overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
    }
    .manual-card:hover { border-color: rgba(212,160,23,0.4); transform: translateY(-3px); }
    .manual-card .icon-circle {
      width: 50px; height: 50px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; margin-bottom: 1rem;
    }
    .manual-card h3 { font-size: 1rem; margin-bottom: 0.4rem; color: #fff; }
    .manual-card .filename { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-bottom: 1rem; word-break: break-all; }
    .manual-card .dl-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; padding: 0.55rem 1.2rem; color: #fff;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .manual-card .dl-btn:hover { background: rgba(212,160,23,0.15); border-color: rgba(212,160,23,0.4); }
    .manual-card .dl-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .manual-card .dl-btn .spinner { display: none; animation: spin 0.8s linear infinite; }
    .manual-card .dl-btn.loading .spinner { display: inline-block; }
    .manual-card .dl-btn.loading .dl-icon { display: none; }
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: #1a1a2e; border: 1px solid rgba(212,160,23,0.3); color: #fff; padding: 0.8rem 1.5rem; border-radius: 10px; font-size: 0.88rem; transform: translateY(100px); opacity: 0; transition: transform 0.3s, opacity 0.3s; z-index: 999; }
    .toast.show { transform: translateY(0); opacity: 1; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .manual-grid { grid-template-columns: 1fr; }
      .topbar { padding: 0.8rem 1rem; }
      .topbar h1 { font-size: 1.1rem; }
      .quick-download-row { flex-direction: column; }
      .quick-dl-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1 data-testid="text-page-title"><i class="fas fa-book"></i> Admin Manuals</h1>
    <a href="/admin-panel" data-testid="link-back"><i class="fas fa-arrow-left"></i> Back to Panel</a>
  </div>

  <div class="container">
    <div class="intro">
      <h2><i class="fas fa-info-circle"></i> Platform Documentation</h2>
      <p>Download comprehensive PDF manuals covering all aspects of the AfricaBased platform. Each manual is generated with the latest information and branded with the company logo. Share these with your team or keep them for reference.</p>
    </div>

    <div class="quick-download" data-testid="section-quick-download">
      <h3><i class="fas fa-bolt"></i> Quick Download</h3>
      <div class="quick-download-row">
        <select id="manualSelect" data-testid="select-manual">
          <option value="" disabled selected>Choose a manual...</option>
          <option value="commission">Commission & Referral Manual</option>
          <option value="deposit-withdrawal">Deposit & Withdrawal Manual</option>
          <option value="product">Products & Investment Manual</option>
          <option value="platform">Platform Operations Guide</option>
          <option value="all">All Manuals (ZIP)</option>
        </select>
        <button class="quick-dl-btn" id="quickDlBtn" data-testid="button-quick-download" onclick="quickDownload()">
          <i class="fas fa-download" id="quickDlIcon"></i>
          <span id="quickDlText">Download PDF</span>
        </button>
      </div>
    </div>

    <div class="manual-grid" id="manualGrid" data-testid="section-manual-grid"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    async function loadManuals() {
      try {
        const res = await fetch('/api/admin/manuals', { credentials: 'include' });
        if (!res.ok) { window.location.href = '/admin-login'; return; }
        const manuals = await res.json();
        const grid = document.getElementById('manualGrid');
        grid.innerHTML = manuals.map(m => `
          <div class="manual-card" data-testid="card-manual-${m.id}">
            <div class="icon-circle" style="background:${m.color}22;color:${m.color};">
              <i class="fas ${m.icon}"></i>
            </div>
            <h3>${m.name}</h3>
            <div class="filename"><i class="fas fa-file-pdf" style="color:#e74c3c;margin-right:4px;"></i>${m.filename}</div>
            <button class="dl-btn" data-testid="button-download-${m.id}" onclick="downloadManual('${m.id}','${m.filename}',this)">
              <i class="fas fa-download dl-icon"></i>
              <i class="fas fa-spinner spinner"></i>
              Download PDF
            </button>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to load manuals:', e);
        showToast('Failed to load manuals');
      }
    }

    async function downloadManual(id, filename, btn) {
      if (btn.disabled) return;
      btn.disabled = true;
      btn.classList.add('loading');
      try {
        const res = await fetch('/api/admin/manuals/' + id, { credentials: 'include' });
        if (!res.ok) throw new Error('Download failed');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
        showToast('Downloaded: ' + filename);
      } catch (e) {
        showToast('Failed to download ' + filename);
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    }

    async function quickDownload() {
      const sel = document.getElementById('manualSelect');
      const btn = document.getElementById('quickDlBtn');
      const icon = document.getElementById('quickDlIcon');
      const txt = document.getElementById('quickDlText');
      const val = sel.value;
      if (!val) { showToast('Please select a manual first'); return; }
      btn.disabled = true;
      icon.className = 'fas fa-spinner fa-spin';
      txt.textContent = 'Generating...';
      try {
        const isAll = val === 'all';
        const url = isAll ? '/api/admin/manuals-all' : '/api/admin/manuals/' + val;
        const res = await fetch(url, { credentials: 'include' });
        if (!res.ok) throw new Error('Download failed');
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        const ct = res.headers.get('content-disposition') || '';
        const fnMatch = ct.match(/filename="?([^"]+)"?/);
        a.download = fnMatch ? fnMatch[1] : (isAll ? 'AfricaBased_Manuals.zip' : 'AfricaBased_Manual.pdf');
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(a.href);
        showToast(isAll ? 'All manuals downloaded as ZIP!' : 'PDF downloaded successfully!');
        icon.className = 'fas fa-check';
        txt.textContent = 'Downloaded!';
        setTimeout(() => { icon.className = 'fas fa-download'; txt.textContent = 'Download PDF'; }, 2500);
      } catch (e) {
        console.error(e);
        showToast('Download failed. Please try again.');
        icon.className = 'fas fa-exclamation-triangle';
        txt.textContent = 'Failed';
        setTimeout(() => { icon.className = 'fas fa-download'; txt.textContent = 'Download PDF'; }, 2500);
      } finally { btn.disabled = false; }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    loadManuals();
  </script>
</body>
</html>
