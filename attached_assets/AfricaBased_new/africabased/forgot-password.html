<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#06090f">
    <link rel="apple-touch-icon" href="/public/logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AfricaBased">
    <title>Forgot Password - AfricaBased</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #06090f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #0d1b2a;
            border: 1px solid #1a2e45;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo h1 {
            color: #0a9e8c;
            font-size: 26px;
            font-weight: 700;
        }
        .logo p {
            color: #8899aa;
            font-size: 14px;
            margin-top: 4px;
        }
        h2 {
            color: #e0e0e0;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #8899aa;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #aabbcc;
            font-size: 13px;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            background: #0a1628;
            border: 1.5px solid #1a2e45;
            border-radius: 8px;
            padding: 12px 14px;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #0a9e8c; }
        .btn {
            width: 100%;
            background: #0a9e8c;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 13px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #089080; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 18px;
            display: none;
        }
        .alert.error { background: rgba(220,53,69,0.15); border: 1px solid rgba(220,53,69,0.4); color: #ff6b7a; }
        .alert.success { background: rgba(10,158,140,0.15); border: 1px solid rgba(10,158,140,0.4); color: #0a9e8c; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #8899aa;
            font-size: 14px;
            text-decoration: none;
        }
        .back-link:hover { color: #0a9e8c; }
    </style>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="card">
    <div class="logo">
        <h1>AfricaBased</h1>
        <p>Investment Platform</p>
    </div>
    <h2>Forgot Password?</h2>
    <p class="subtitle">Enter the email address linked to your account and we'll send you a password reset link.</p>

    <div class="alert error" id="errMsg"></div>
    <div class="alert success" id="successMsg"></div>

    <form id="forgotForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="btn" id="submitBtn">
            <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>
    </form>

    <a href="/login" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
</div>

<script>
    const errMsg = document.getElementById('errMsg');
    const successMsg = document.getElementById('successMsg');

    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        errMsg.style.display = 'none';
        successMsg.style.display = 'none';

        const email = document.getElementById('email').value.trim();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending…';

        try {
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            if (!res.ok) {
                errMsg.textContent = data.error || 'Something went wrong.';
                errMsg.style.display = 'block';
            } else {
                successMsg.textContent = data.message;
                successMsg.style.display = 'block';
                document.getElementById('forgotForm').style.display = 'none';
            }
        } catch(err) {
            errMsg.textContent = 'Network error. Please check your connection.';
            errMsg.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
        }
    });
</script>
<script src="/js/ai-assistant.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
