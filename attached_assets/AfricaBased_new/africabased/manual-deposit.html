<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Manual Deposit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Segoe UI', sans-serif; }
        body { background: #06090f; color: #fff; min-height: 100vh; padding: 24px 16px 48px; }

        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(212,160,23,0.1); border: 1px solid rgba(212,160,23,0.25);
            color: #d4a017; padding: 9px 18px; border-radius: 10px;
            font-weight: 600; font-size: 0.85rem; cursor: pointer; margin-bottom: 22px;
            text-decoration: none; transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(212,160,23,0.18); }

        /* Instructions box — shown standalone only */
        .instr-box {
            background: rgba(255,213,79,0.07); border: 1px solid rgba(255,213,79,0.28);
            border-radius: 12px; padding: 18px 20px; margin-bottom: 22px;
        }
        .instr-heading {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.88rem; font-weight: 700; color: #ffd54f; margin-bottom: 12px;
        }
        .instr-steps ol {
            margin: 0; padding-left: 20px; list-style: decimal;
        }
        .instr-steps li {
            font-size: 0.87rem; color: rgba(255,255,255,0.82); margin-bottom: 7px; line-height: 1.6;
        }
        .instr-steps li:last-child { margin-bottom: 0; }
        .instr-plain { font-size: 0.87rem; color: rgba(255,255,255,0.8); line-height: 1.7; white-space: pre-wrap; }

        /* Form card */
        .card {
            background: rgba(13,21,32,0.98); border-radius: 14px;
            box-shadow: 0 6px 28px rgba(0,0,0,0.4); padding: 26px 22px;
        }
        .card-title {
            font-size: 1.05rem; font-weight: 700; color: #fff;
            display: flex; align-items: center; gap: 10px; margin-bottom: 22px;
        }
        .card-title i { color: #d4a017; }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.65); margin-bottom: 7px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }

        input[type=text], input[type=number], textarea {
            width: 100%; padding: 12px 14px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #fff; font-size: 0.9rem; font-family: inherit;
            outline: none; transition: border-color 0.2s;
        }
        input[type=text]:focus, input[type=number]:focus, textarea:focus {
            border-color: #d4a017;
        }
        textarea { resize: vertical; line-height: 1.55; }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.3); }

        .submit-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(90deg, #d4a017, #3ab8b0);
            border: none; border-radius: 12px;
            color: #06090f; font-weight: 800; font-size: 0.95rem;
            cursor: pointer; margin-top: 8px; transition: opacity 0.2s, transform 0.15s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .error-msg { color: #ff6b6b; font-size: 0.84rem; margin-top: 12px; display: none; }
        .error-msg.show { display: block; }

        /* ── Payment Confirmation Overlay (Safaricom M-Pesa Green) ── */
        .pay-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.88); backdrop-filter: blur(10px);
            z-index: 9999; align-items: center; justify-content: center; padding: 20px;
        }
        .pay-overlay.show { display: flex; }
        .pay-card {
            border-radius: 22px; padding: 0; max-width: 380px; width: 100%;
            text-align: center; overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
            animation: payPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes payPop {
            0% { opacity: 0; transform: scale(0.85) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Pending state — Safaricom Green */
        .pay-card.pending {
            background: linear-gradient(165deg, #0a3d0a 0%, #0d4d1a 40%, #062e0a 100%);
            border: 1px solid rgba(76,175,80,0.35);
        }
        .pay-card.pending .pay-header {
            background: linear-gradient(135deg, rgba(76,175,80,0.2), rgba(46,125,50,0.08));
            border-bottom: 1px solid rgba(76,175,80,0.15);
        }
        .pay-card.pending .pay-icon-circle {
            background: linear-gradient(135deg, #4CAF50, #2e7d32);
            box-shadow: 0 8px 28px rgba(76,175,80,0.4);
        }

        /* Confirmed state — bright Safaricom Green */
        .pay-card.confirmed {
            background: linear-gradient(165deg, #0a3d0a 0%, #125a1e 40%, #0a3d0a 100%);
            border: 1px solid rgba(76,175,80,0.5);
        }
        .pay-card.confirmed .pay-header {
            background: linear-gradient(135deg, rgba(76,175,80,0.25), rgba(56,142,60,0.1));
            border-bottom: 1px solid rgba(76,175,80,0.2);
        }
        .pay-card.confirmed .pay-icon-circle {
            background: linear-gradient(135deg, #66bb6a, #43a047);
            box-shadow: 0 8px 28px rgba(76,175,80,0.5);
        }

        /* Rejected state — Red */
        .pay-card.rejected {
            background: linear-gradient(165deg, #3d0a0a 0%, #4d1a1a 40%, #2e0606 100%);
            border: 1px solid rgba(244,67,54,0.35);
        }
        .pay-card.rejected .pay-header {
            background: linear-gradient(135deg, rgba(244,67,54,0.2), rgba(198,40,40,0.08));
            border-bottom: 1px solid rgba(244,67,54,0.15);
        }
        .pay-card.rejected .pay-icon-circle {
            background: linear-gradient(135deg, #f44336, #c62828);
            box-shadow: 0 8px 28px rgba(244,67,54,0.4);
        }

        .pay-header { padding: 2rem 1.5rem 1.5rem; }
        .pay-icon-circle {
            width: 72px; height: 72px; margin: 0 auto 1rem;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.9rem; color: #fff;
        }
        .pay-title {
            font-size: 1.15rem; font-weight: 800; color: #fff; margin-bottom: 2px;
            letter-spacing: 0.02em;
        }
        .pay-subtitle {
            font-size: 0.78rem; color: rgba(255,255,255,0.45);
        }
        .pay-body { padding: 1rem 1.5rem 1.6rem; }
        .pay-amount-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 1rem; border-radius: 12px; margin-bottom: 0.75rem;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
        }
        .pay-amount-label { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
        .pay-amount-value { font-size: 1.1rem; font-weight: 800; color: #fff; }
        .pay-status-row {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 0.6rem; margin-bottom: 1rem;
            font-size: 0.85rem; font-weight: 600;
        }
        .pay-status-row.pending-status { color: #81c784; }
        .pay-status-row.confirmed-status { color: #66bb6a; }
        .pay-status-row.rejected-status { color: #ef5350; }

        @keyframes spinPulse {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .pay-spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(129,199,132,0.3); border-top-color: #81c784;
            border-radius: 50%; animation: spinPulse 0.8s linear infinite;
        }
        .pay-msg {
            font-size: 0.84rem; color: rgba(255,255,255,0.5); line-height: 1.6;
            margin-bottom: 1.2rem;
        }
        .pay-btn {
            border: none; border-radius: 14px;
            padding: 0.85rem 2.5rem; font-weight: 700; font-size: 0.92rem;
            cursor: pointer; transition: all 0.25s; color: #fff;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .pay-btn.green {
            background: linear-gradient(135deg, #4CAF50, #2e7d32);
            box-shadow: 0 4px 16px rgba(76,175,80,0.3);
        }
        .pay-btn.green:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(76,175,80,0.4); }
        .pay-btn.red {
            background: linear-gradient(135deg, #f44336, #c62828);
            box-shadow: 0 4px 16px rgba(244,67,54,0.3);
        }
        .pay-btn.red:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(244,67,54,0.4); }
        .pay-btn.outline {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.6); padding: 0.65rem 1.8rem; font-size: 0.85rem;
        }
        .pay-btn.outline:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .pay-progress-bar {
            height: 3px; border-radius: 3px; background: rgba(255,255,255,0.08);
            margin-bottom: 1rem; overflow: hidden;
        }
        .pay-progress-bar .bar {
            height: 100%; border-radius: 3px; transition: width 0.3s;
            background: linear-gradient(90deg, #4CAF50, #81c784);
        }
        .pay-card.rejected .pay-progress-bar .bar {
            background: linear-gradient(90deg, #f44336, #ef5350);
        }
        .pay-txn-id {
            font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-top: 0.75rem;
            font-family: 'Courier New', monospace; letter-spacing: 1px;
        }
    </style>
<script src="/js/token.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <a class="back-btn" onclick="window.top && window.top !== window ? window.top.location.href = '/home' : window.location.href = '/home'">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>

    <!-- Instructions: only rendered when accessed as standalone page (not inside deposit.html iframe) -->
    <div class="instr-box" id="instrBox" style="display:none;">
        <div class="instr-heading"><i class="fas fa-info-circle"></i> Payment Instructions</div>
        <div class="instr-steps" id="instrSteps"></div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-paper-plane"></i> Submit Deposit</div>

        <form id="depositForm" autocomplete="off">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Your Phone / Account Number</label>
                    <input type="text" id="fieldPhone" placeholder="e.g. 0712345678" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Amount (KES)</label>
                    <input type="number" id="fieldAmount" placeholder="e.g. 500" min="10" step="1" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">M-Pesa Message</label>
                <textarea id="fieldMpesa" rows="5"
                    placeholder="Paste your full M-Pesa confirmation SMS here&#10;e.g. QHX1B3K9PL Confirmed. You have sent Ksh500 to AFRICABASED..."
                    maxlength="600" required></textarea>
                <div id="txnPreview" style="margin-top:8px;display:none;">
                    <span style="color:rgba(255,255,255,0.5);font-size:0.82rem;">Transaction ID: </span>
                    <span id="txnIdValue" style="color:#d4a017;font-weight:700;font-size:0.92rem;letter-spacing:0.5px;"></span>
                </div>
            </div>

            <div class="error-msg" id="errMsg"></div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-paper-plane"></i> Submit Deposit
            </button>
        </form>
    </div>

    <!-- Payment Confirmation Modal -->
    <div class="pay-overlay" id="payOverlay">
        <div class="pay-card pending" id="payCard">
            <div class="pay-header">
                <div class="pay-icon-circle" id="payIcon"><i class="fas fa-clock" id="payIconI"></i></div>
                <div class="pay-title" id="payTitle">Confirming Payment</div>
                <div class="pay-subtitle" id="paySubtitle">M-PESA Transaction</div>
            </div>
            <div class="pay-body">
                <div class="pay-amount-row">
                    <span class="pay-amount-label">Amount</span>
                    <span class="pay-amount-value" id="payAmount">KES 0</span>
                </div>
                <div class="pay-progress-bar" id="payProgressWrap">
                    <div class="bar" id="payProgressBar" style="width:10%"></div>
                </div>
                <div class="pay-status-row pending-status" id="payStatusRow">
                    <span class="pay-spinner" id="paySpinner"></span>
                    <span id="payStatusText">Waiting for confirmation...</span>
                </div>
                <div class="pay-msg" id="payMsg">Your payment is being verified. This usually takes a few minutes. Please do not close this page.</div>
                <button class="pay-btn outline" id="payDismissBtn" style="display:none;" onclick="onPayClose()"><i class="fas fa-home"></i> Back to Dashboard</button>
                <button class="pay-btn green" id="payConfirmedBtn" style="display:none;" onclick="onPayClose()"><i class="fas fa-check-circle"></i> Continue</button>
                <button class="pay-btn red" id="payRejectedBtn" style="display:none;" onclick="onPayClose()"><i class="fas fa-times-circle"></i> Close</button>
                <div class="pay-txn-id" id="payTxnId"></div>
            </div>
        </div>
    </div>

    <script>
        
        

        function showError(msg) {
            const el = document.getElementById('errMsg');
            el.textContent = msg;
            el.classList.add('show');
        }
        function clearError() {
            const el = document.getElementById('errMsg');
            el.textContent = '';
            el.classList.remove('show');
        }

        let pollTimer = null;
        let progressVal = 10;

        function onPayClose() {
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
            document.getElementById('payOverlay').classList.remove('show');
            document.getElementById('depositForm').reset();
            clearError();
            if (window !== window.parent) {
                window.parent.location.href = '/home';
            } else {
                window.location.href = '/home';
            }
        }

        function showPaymentConfirmation(depositId, amount, txnId) {
            const card = document.getElementById('payCard');
            const overlay = document.getElementById('payOverlay');

            card.className = 'pay-card pending';
            document.getElementById('payIconI').className = 'fas fa-clock';
            document.getElementById('payTitle').textContent = 'Confirming Payment';
            document.getElementById('paySubtitle').textContent = 'M-PESA Transaction';
            document.getElementById('payAmount').textContent = 'KES ' + parseFloat(amount).toLocaleString(undefined, { minimumFractionDigits: 2 });
            document.getElementById('payStatusRow').className = 'pay-status-row pending-status';
            document.getElementById('paySpinner').style.display = 'inline-block';
            document.getElementById('payStatusText').textContent = 'Waiting for confirmation...';
            document.getElementById('payMsg').textContent = 'Your payment is being verified. This usually takes a few minutes. Please do not close this page.';
            document.getElementById('payProgressBar').style.width = '10%';
            document.getElementById('payProgressWrap').style.display = '';
            document.getElementById('payDismissBtn').style.display = 'none';
            document.getElementById('payConfirmedBtn').style.display = 'none';
            document.getElementById('payRejectedBtn').style.display = 'none';
            document.getElementById('payTxnId').textContent = txnId ? 'TXN: ' + txnId : '';

            overlay.classList.add('show');
            progressVal = 10;
            let pollErrors = 0;
            const pollStart = Date.now();
            const MAX_POLL_MS = 10 * 60 * 1000;

            pollTimer = setInterval(async () => {
                if (Date.now() - pollStart > MAX_POLL_MS) {
                    clearInterval(pollTimer); pollTimer = null;
                    document.getElementById('paySpinner').style.display = 'none';
                    document.getElementById('payStatusText').textContent = 'Still pending review';
                    document.getElementById('payMsg').textContent = 'Your deposit is under review. You can check its status from your dashboard.';
                    document.getElementById('payDismissBtn').style.display = 'inline-flex';
                    return;
                }

                progressVal = Math.min(progressVal + 2, 90);
                document.getElementById('payProgressBar').style.width = progressVal + '%';

                try {
                    const token = getABToken();
                    const res = await fetch('/api/deposits/' + depositId + '/status', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (!res.ok) { pollErrors++; if (pollErrors >= 5) { document.getElementById('payDismissBtn').style.display = 'inline-flex'; } return; }
                    pollErrors = 0;
                    const data = await res.json();

                    if (data.status === 'confirmed') {
                        clearInterval(pollTimer); pollTimer = null;
                        card.className = 'pay-card confirmed';
                        document.getElementById('payIconI').className = 'fas fa-check-circle';
                        document.getElementById('payTitle').textContent = 'Payment Confirmed';
                        document.getElementById('paySubtitle').textContent = 'Transaction Successful';
                        document.getElementById('payStatusRow').className = 'pay-status-row confirmed-status';
                        document.getElementById('paySpinner').style.display = 'none';
                        document.getElementById('payStatusText').textContent = 'Payment has been approved!';
                        document.getElementById('payMsg').textContent = 'Your deposit of KES ' + parseFloat(amount).toLocaleString(undefined, { minimumFractionDigits: 2 }) + ' has been credited to your account.';
                        document.getElementById('payProgressBar').style.width = '100%';
                        document.getElementById('payConfirmedBtn').style.display = 'inline-flex';
                    } else if (data.status === 'rejected') {
                        clearInterval(pollTimer); pollTimer = null;
                        card.className = 'pay-card rejected';
                        document.getElementById('payIconI').className = 'fas fa-times-circle';
                        document.getElementById('payTitle').textContent = 'Payment Rejected';
                        document.getElementById('paySubtitle').textContent = 'Transaction Failed';
                        document.getElementById('payStatusRow').className = 'pay-status-row rejected-status';
                        document.getElementById('paySpinner').style.display = 'none';
                        document.getElementById('payStatusText').textContent = 'Payment was not approved';
                        document.getElementById('payMsg').textContent = 'Your deposit could not be verified. Please contact support or submit a new deposit with the correct details.';
                        document.getElementById('payProgressBar').style.width = '100%';
                        document.getElementById('payRejectedBtn').style.display = 'inline-flex';
                    }
                } catch(e) { pollErrors++; if (pollErrors >= 5) { document.getElementById('payDismissBtn').style.display = 'inline-flex'; } }
            }, 5000);

            setTimeout(() => {
                if (pollTimer) {
                    document.getElementById('payDismissBtn').style.display = 'inline-flex';
                }
            }, 30000);
        }

        // ── Load instructions (only when accessed standalone, not in iframe) ──
        async function loadInstructions() {
            if (window !== window.parent) return; // inside deposit.html iframe — parent already shows them
            try {
                const res = await fetch('/api/deposit/config');
                const cfg = await res.json();
                const text = (cfg.instructions || '').trim();
                if (!text) return;
                const box = document.getElementById('instrBox');
                const steps = document.getElementById('instrSteps');
                box.style.display = 'block';
                // Format: if lines start with numbers, render as ordered list
                const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
                const isNumbered = lines.every(l => /^\d+[\.\)]\s/.test(l));
                if (isNumbered) {
                    steps.innerHTML = '<ol>' + lines.map(l => '<li>' + l.replace(/^\d+[\.\)]\s+/, '') + '</li>').join('') + '</ol>';
                } else {
                    // Check if any line starts with number
                    const hasSomeNumbers = lines.some(l => /^\d+[\.\)]\s/.test(l));
                    if (hasSomeNumbers) {
                        steps.innerHTML = '<ol>' + lines.map(l => '<li>' + l.replace(/^\d+[\.\)]\s+/, '') + '</li>').join('') + '</ol>';
                    } else {
                        steps.innerHTML = '<div class="instr-plain">' + text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>';
                    }
                }
            } catch(e) {}
        }

        document.getElementById('fieldMpesa').addEventListener('input', function() {
            const val = this.value.trim();
            const match = val.match(/\b([A-Z0-9]{8,12})\b/);
            const preview = document.getElementById('txnPreview');
            const txnVal = document.getElementById('txnIdValue');
            if (match) {
                txnVal.textContent = match[1];
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        });

        // ── Form submission ──
        document.getElementById('depositForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            clearError();

            const token = getABToken();
            if (!token) {
                showError('You must be logged in to submit a deposit. Please log in and try again.');
                return;
            }

            const phone = document.getElementById('fieldPhone').value.trim();
            const amount = document.getElementById('fieldAmount').value.trim();
            const mpesa_message = document.getElementById('fieldMpesa').value.trim();

            if (!phone) { showError('Please enter your phone or account number.'); return; }
            if (!amount || isNaN(parseFloat(amount)) || parseFloat(amount) < 10) {
                showError('Please enter a valid amount (minimum KES 10).'); return;
            }
            if (!mpesa_message) { showError('Please paste your M-Pesa confirmation message.'); return; }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting…';

            try {
                const res = await fetch('/api/deposits/manual', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ amount, mpesa_message, phone_or_account: phone })
                });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Failed to submit deposit. Please try again.');
                } else {
                    const txMatch = document.getElementById('fieldMpesa').value.trim().match(/\b([A-Z0-9]{8,12})\b/);
                    showPaymentConfirmation(data.id, document.getElementById('fieldAmount').value, txMatch ? txMatch[1] : null);
                }
            } catch(err) {
                showError('Network error. Please check your connection and try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Deposit';
            }
        });

        loadInstructions();
    </script>
<script src="/js/impersonation-guard.js"></script>
<script src="/js/ai-assistant.js"></script>
</body>
</html>
