<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AfricaBased – You're Offline</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      background: #06090f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 440px; width: 100%; }
    .icon-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(212,160,23,0.12);
      border: 2px solid rgba(212,160,23,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 2.5rem;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,160,23,0.3); }
      50% { box-shadow: 0 0 0 18px rgba(212,160,23,0); }
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 2.5rem;
    }
    .logo img { width: 36px; height: 36px; border-radius: 8px; }
    .logo span { font-size: 1.25rem; font-weight: 700; color: #d4a017; }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.75rem; }
    p {
      color: rgba(255,255,255,0.6);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(45deg, #d4a017, #1abc9c);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .status {
      margin-top: 2rem;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
    }
    .status.online { color: #d4a017; background: rgba(212,160,23,0.1); }
  </style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/public/logo.png" alt="AfricaBased" onerror="this.style.display='none'">
      <span>AfricaBased</span>
    </div>
    <div class="icon-wrap">📡</div>
    <h1>You're offline</h1>
    <p>
      No internet connection detected.<br>
      Pages you've visited before are still available.
      Reconnect to access live balances and make transactions.
    </p>
    <button class="btn" onclick="tryReload()">
      ↺ Try Again
    </button>
    <div class="status" id="statusMsg">Waiting for connection…</div>
  </div>

  <script>
    function tryReload() {
      window.location.reload();
    }

    function updateStatus() {
      const el = document.getElementById('statusMsg');
      if (navigator.onLine) {
        el.textContent = '✓ Connected — reloading…';
        el.classList.add('online');
        setTimeout(() => window.history.back(), 1000);
      } else {
        el.textContent = 'Waiting for connection…';
        el.classList.remove('online');
      }
    }

    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
