<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AfricaBased - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="AfricaBased - Africa's best investment platform">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#09090b">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/public/icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/public/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/public/icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/public/icons/icon-192x192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AfricaBased">
  <meta name="msapplication-TileColor" content="#09090b">
  <meta name="msapplication-TileImage" content="/public/icons/icon-144x144.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/public/icons/icon-48x48.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/public/icons/icon-192x192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/fintech-theme.css">
<script src="/js/theme.js"></script>
  <script src="/js/token.js"></script>
  <script type="module" async>
    import { checkAuthState } from './js/auth.js';
    checkAuthState();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{height:100%}
    body{
      font-family:var(--ft-font);
      background:var(--ft-bg);
      color:var(--ft-text);
      min-height:100%;
      padding-top:var(--ft-nav-h);
      padding-bottom:calc(var(--ft-tab-h) + env(safe-area-inset-bottom,0px) + 12px);
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
    }

    .top-nav{
      position:fixed;top:0;left:0;right:0;height:var(--ft-nav-h);
      background:var(--ft-nav-bg);
      backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;z-index:500;
      border-bottom:1px solid var(--ft-border);
    }
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
    .brand img{width:32px;height:32px;border-radius:8px}
    .brand span{font-size:1rem;font-weight:700;color:var(--ft-text);letter-spacing:-0.01em}
    .nav-mid{
      flex:1;text-align:right;padding-right:12px;
      font-size:0.82rem;font-weight:500;color:var(--ft-text-secondary);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .nav-mid b{color:var(--ft-text);font-weight:600}
    .nav-avatar{
      width:36px;height:36px;border-radius:50%;object-fit:cover;
      border:2px solid var(--ft-border-hover);cursor:pointer;flex-shrink:0;
      transition:var(--ft-transition);
    }
    .nav-avatar:hover{border-color:var(--ft-gold)}

    .page-content{padding:20px 20px 0}

    .hcard{
      border-radius:var(--ft-radius-xl);
      padding:24px;position:relative;overflow:hidden;
      background:var(--ft-card);
      border:1px solid var(--ft-border);
      box-shadow:var(--ft-shadow-lg);
      animation:ft-fadeIn 0.4s ease;
    }
    .hcard::before{
      content:'';position:absolute;top:0;right:0;width:50%;height:100%;
      background:radial-gradient(circle at 80% 30%, var(--ft-gold-dim) 0%, transparent 60%);
      pointer-events:none;
    }
    .hc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;position:relative;z-index:1}
    .hc-lbl{
      font-size:.68rem;font-weight:600;letter-spacing:1.5px;
      color:var(--ft-text-muted);text-transform:uppercase;
    }
    .hc-val{
      font-size:2.2rem;font-weight:900;
      color:var(--ft-text);line-height:1.1;margin-bottom:14px;
      position:relative;z-index:1;
      letter-spacing:-0.02em;
    }
    .hc-val .kes{font-size:1rem;font-weight:600;color:var(--ft-text-muted);margin-right:4px}
    .hc-meta{display:flex;gap:16px;flex-wrap:wrap;position:relative;z-index:1}
    .hc-meta span{
      font-size:.78rem;color:var(--ft-text-secondary);
      display:flex;align-items:center;gap:6px;
      background:var(--ft-glass);
      padding:6px 12px;border-radius:var(--ft-radius-sm);
    }
    .hc-meta span b{color:var(--ft-text);font-weight:600}
    .hc-meta span i{color:var(--ft-gold);font-size:.75rem}

    .qactions{
      display:flex;gap:8px;padding:16px 0 0;
      overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;
    }
    .qactions::-webkit-scrollbar{display:none}
    .qa{
      display:flex;align-items:center;gap:8px;
      padding:10px 18px;border-radius:var(--ft-radius-md);
      background:var(--ft-card);
      border:1px solid var(--ft-border);
      color:var(--ft-text-secondary);font-size:.82rem;font-weight:600;
      text-decoration:none;white-space:nowrap;flex-shrink:0;cursor:pointer;
      transition:var(--ft-transition);
      font-family:var(--ft-font);
    }
    .qa:hover,.qa:active{
      background:var(--ft-card-hover);
      border-color:var(--ft-border-hover);
      color:var(--ft-text);
    }
    .qa i{color:var(--ft-gold);font-size:.85rem}

    .section-header{
      display:flex;align-items:baseline;justify-content:space-between;
      padding:28px 0 6px;
    }
    .stitle{
      font-size:1.25rem;font-weight:800;
      color:var(--ft-text);letter-spacing:-0.02em;
    }
    .ssub{
      padding:4px 0 12px;
      font-size:.85rem;font-weight:500;
      color:var(--ft-text-muted);
    }

    .cats{display:flex;gap:6px;padding:0 0 16px;overflow-x:auto;scrollbar-width:none}
    .cats::-webkit-scrollbar{display:none}
    .cpill{
      padding:7px 16px;border-radius:var(--ft-radius-sm);font-size:.78rem;font-weight:600;
      border:1px solid var(--ft-border);background:transparent;
      color:var(--ft-text-muted);cursor:pointer;white-space:nowrap;flex-shrink:0;
      transition:var(--ft-transition);font-family:var(--ft-font);
    }
    .cpill:hover{border-color:var(--ft-border-hover);color:var(--ft-text-secondary)}
    .cpill.active{background:var(--ft-gold-dim);border-color:rgba(212,160,23,0.2);color:var(--ft-gold-bright)}

    .feat{
      border-radius:var(--ft-radius-lg);background:var(--ft-card);
      border:1px solid var(--ft-border);overflow:hidden;
      box-shadow:var(--ft-shadow);
      transition:var(--ft-transition);
      margin-bottom:16px;
    }
    .feat:hover{border-color:var(--ft-border-hover);transform:translateY(-2px);box-shadow:var(--ft-shadow-lg)}
    .feat-img-wrap{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden}
    .feat-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease}
    .feat:hover .feat-img{transform:scale(1.03)}
    .feat-img-ph{
      width:100%;height:100%;
      background:linear-gradient(135deg,#1a2430,#0f1720);
      display:flex;align-items:center;justify-content:center;font-size:2.6rem;
    }
    .feat-img-overlay{
      position:absolute;bottom:0;left:0;right:0;height:60%;
      background:linear-gradient(0deg, var(--ft-card) 0%, rgba(22,22,26,0.5) 50%, transparent 100%);
      pointer-events:none;
    }
    .feat-badge{
      position:absolute;top:12px;left:12px;
      padding:5px 12px;border-radius:6px;
      background:var(--ft-overlay);border:1px solid var(--ft-border);
      backdrop-filter:blur(8px);
      font-size:.7rem;font-weight:700;color:var(--ft-text-secondary);
      text-transform:uppercase;letter-spacing:.5px;
    }
    .feat-info{padding:16px 20px 20px;display:flex;flex-direction:column;gap:6px}
    .feat-name{font-size:1rem;font-weight:700;color:var(--ft-text);letter-spacing:-0.01em;line-height:1.4}
    .feat-stat{font-size:.82rem;color:var(--ft-text-secondary);margin:0;line-height:1.6}
    .feat-stat b{color:var(--ft-gold-bright);font-weight:700}

    .plist{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .plcard{
      border-radius:var(--ft-radius-lg);background:var(--ft-card);
      border:1px solid var(--ft-border);overflow:hidden;
      box-shadow:var(--ft-shadow);
      transition:var(--ft-transition);
    }
    .plcard:hover{border-color:var(--ft-border-hover);transform:translateY(-2px);box-shadow:var(--ft-shadow-lg)}
    .pl-img-wrap{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden}
    .pl-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease}
    .plcard:hover .pl-img{transform:scale(1.03)}
    .pl-img-ph{width:100%;height:100%;background:linear-gradient(135deg,#1a2430,#0f1720);display:flex;align-items:center;justify-content:center;font-size:1.8rem}
    .pl-img-grad{
      position:absolute;bottom:0;left:0;right:0;height:50%;
      background:linear-gradient(0deg, var(--ft-card) 0%, transparent 100%);
      pointer-events:none;
    }
    .pl-info{padding:12px 14px 14px}
    .pl-name{font-size:.82rem;font-weight:700;color:var(--ft-text);line-height:1.3;margin-bottom:8px}
    .pl-tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{font-size:.68rem;font-weight:600;padding:3px 8px;border-radius:5px}
    .tag-price{background:var(--ft-gold-dim);color:var(--ft-gold-bright)}
    .tag-daily{background:var(--ft-green-dim);color:var(--ft-green)}

    .tcard{
      background:var(--ft-card);border-radius:var(--ft-radius-lg);
      padding:16px 18px;border:1px solid var(--ft-border);
      box-shadow:var(--ft-shadow);
      transition:var(--ft-transition);
    }
    .tcard:hover{border-color:var(--ft-border-hover)}
    .tcard-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .tcard-head img{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--ft-border-hover);flex-shrink:0}
    .tcard-head .tn{font-weight:700;font-size:.88rem;color:var(--ft-text)}
    .tcard-head .tr{font-size:.72rem;color:var(--ft-text-muted)}
    .tcard p{color:var(--ft-text-secondary);font-style:italic;font-size:.84rem;line-height:1.7;margin:0}

    .btabs{
      position:fixed;bottom:0;left:0;right:0;
      height:var(--ft-tab-h);
      background:var(--ft-tab-bg);
      backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
      border-top:1px solid var(--ft-border);
      display:flex;align-items:center;padding:0;
      z-index:500;padding-bottom:env(safe-area-inset-bottom,0px);
    }
    .bt{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
      text-decoration:none;cursor:pointer;transition:var(--ft-transition);
      position:relative;padding:8px 0;
    }
    .bt:active{transform:scale(0.92)}
    .bt-ic{
      width:28px;height:28px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;
    }
    .bt.active .bt-ic{color:var(--ft-gold)}
    .bt:not(.active) .bt-ic{color:var(--ft-text-muted)}
    .bt-lb{font-size:.62rem;font-weight:600;letter-spacing:.3px}
    .bt.active .bt-lb{color:var(--ft-gold)}
    .bt:not(.active) .bt-lb{color:var(--ft-text-muted)}
    .bt.active::before{
      content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);
      width:24px;height:2px;border-radius:2px;background:var(--ft-gold);
    }

    #announcementTicker{display:none;position:sticky;top:0;z-index:150;padding:8px 0;overflow:hidden;font-size:.82rem;font-weight:600;white-space:nowrap;background:var(--ft-gold);color:#09090b}
    #announcementText{display:inline-block;padding-left:100%;animation:tick 28s linear infinite}
    @keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-200%)}}

    .empty{text-align:center;padding:3rem 1rem;color:var(--ft-text-muted);font-size:.9rem}
    .empty i{display:block;font-size:2rem;margin-bottom:10px;opacity:0.4}

    .modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:600;align-items:flex-end;justify-content:center;padding:16px}
    .modal-ov.open{display:flex}
    .modal-bx{background:var(--ft-card);border-radius:var(--ft-radius-xl) var(--ft-radius-xl) var(--ft-radius-lg) var(--ft-radius-lg);border:1px solid var(--ft-border-hover);width:100%;max-width:440px;padding:28px 24px;animation:ft-slideUp .3s ease}
    .modal-bx h3{font-size:1.1rem;font-weight:700;color:var(--ft-text);margin-bottom:12px}
    .modal-bx p{font-size:.88rem;color:var(--ft-text-secondary);margin-bottom:16px;line-height:1.7}
    .macts{display:flex;gap:10px}
    .macts button{flex:1;padding:12px;border-radius:var(--ft-radius-md);font-size:.88rem;font-weight:700;cursor:pointer;border:none;font-family:var(--ft-font);transition:var(--ft-transition)}
    .mc{background:var(--ft-btn-secondary-bg);color:var(--ft-text-secondary)}
    .mo{background:var(--ft-green);color:#fff}
    .mo:hover{background:#16a34a}

    @media(min-width:700px){.plist{grid-template-columns:1fr 1fr 1fr}}
    @media(min-width:768px){body{max-width:960px;margin:0 auto}}
    @media(min-width:1200px){body{max-width:1120px}}
    @media(min-width:700px){.hero-grid{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>

  <nav class="top-nav">
    <a class="brand" href="/home">
      <img src="/public/logo.png" alt="AB" onerror="this.style.display='none'">
      <span>AfricaBased</span>
    </a>
    <div class="nav-mid" id="navWelcome">Welcome</div>
    <button class="ft-theme-toggle" onclick="abToggleTheme()" title="Toggle theme"><i class="fas fa-sun"></i></button>
    <img id="profileImageTop" class="nav-avatar"
         src="https://ui-avatars.com/api/?name=U&background=16161a&color=d4a017&size=80"
         alt="Profile" onclick="window.location.href='/profile'" data-testid="img-avatar"/>
  </nav>

  <div id="announcementTicker"><span id="announcementText"></span></div>

  <div class="page-content">
    <div class="hcard">
      <div class="hc-top">
        <div class="hc-lbl">Total Holdings</div>
        <button id="toggleValuesBtn" onclick="toggleHomeValues()" data-testid="button-toggle-values" style="background:none;border:none;color:var(--ft-text-muted);font-size:1rem;cursor:pointer;padding:4px 6px;position:relative;z-index:2"><i class="fas fa-eye"></i></button>
      </div>
      <div class="hc-val"><span class="kes">KES</span> <span id="portfolioValue" class="hv-amount">0.00</span></div>
      <div class="hc-meta">
        <span><i class="fas fa-cubes"></i> Active: <b id="activeAssets">0</b></span>
        <span><i class="fas fa-arrow-trend-up"></i> Yields Active</span>
      </div>
    </div>

    <div class="qactions">
      <a href="/statistics" class="qa" data-testid="link-wallet-hub"><i class="fas fa-chart-pie"></i> Wallet Hub</a>
      <a href="/withdraw" class="qa" data-testid="link-withdraw"><i class="fas fa-money-bill-transfer"></i> Withdraw</a>
      <a href="/exchange" class="qa" data-testid="link-exchange"><i class="fas fa-right-left"></i> Exchange</a>
      <a href="/deposit" class="qa" data-testid="link-deposit"><i class="fas fa-circle-plus"></i> Deposit</a>
      <a href="/referrals" class="qa" data-testid="link-referrals"><i class="fas fa-user-group"></i> Referrals</a>
      <a href="javascript:void(0)" class="qa ab-install-trigger" onclick="window.abTriggerInstall&&window.abTriggerInstall()" data-testid="button-install-app-home"><i class="fas fa-mobile-screen-button"></i> Install</a>
    </div>

    <div class="section-header">
      <h2 class="stitle">Investment Opportunities</h2>
    </div>
    <p class="ssub">Browse top-performing assets</p>

    <div class="cats" id="sectorButtons"></div>
    <div id="featuredCardWrap"></div>
    <div class="plist ft-stagger" id="productGrid"></div>

    <div class="section-header" style="margin-top:8px">
      <h2 class="stitle">What Our Clients Say</h2>
    </div>
    <div id="testimonialsGrid" style="padding:8px 0 18px;display:flex;flex-direction:column;gap:12px" class="ft-stagger"></div>
  </div>

  <div class="btabs">
    <a href="/home" class="bt active" data-testid="tab-home"><div class="bt-ic"><i class="fas fa-house-chimney"></i></div><span class="bt-lb">Home</span></a>
    <a href="/products" class="bt" data-testid="tab-invest"><div class="bt-ic"><i class="fas fa-arrow-trend-up"></i></div><span class="bt-lb">Invest</span></a>
    <a href="/My-products" class="bt" data-testid="tab-holdings"><div class="bt-ic"><i class="fas fa-cubes-stacked"></i></div><span class="bt-lb">Holdings</span></a>
    <a href="/deposit" class="bt" data-testid="tab-wallet"><div class="bt-ic"><i class="fas fa-vault"></i></div><span class="bt-lb">Wallet</span></a>
    <a href="/profile" class="bt" data-testid="tab-profile"><div class="bt-ic"><i class="fas fa-circle-user"></i></div><span class="bt-lb">My</span></a>
  </div>

  <script type="module">
    import { getSession, startIdleGuard } from './js/api-auth.js';
    const fmt=n=>parseFloat(n||0).toLocaleString('en-KE',{minimumFractionDigits:2,maximumFractionDigits:2});

    async function initUser(){
      try{
        const{session}=await getSession();
        if(!session){window.location.href='/login';return}
        startIdleGuard();
        const u=session.user;
        const name=u.username||u.email||'User';
        const img=document.getElementById('profileImageTop');
        const wel=document.getElementById('navWelcome');
        if(img)img.src=`https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=16161a&color=d4a017&size=80`;
        if(wel){wel.textContent='';const t=document.createTextNode('Welcome, ');const b=document.createElement('b');b.textContent=name;wel.appendChild(t);wel.appendChild(b)}
        try{
          const r=await fetch('/api/auth/me',{headers:{'Authorization':'Bearer '+getABToken()}});
          if(r.ok){const d=await r.json();const p=d.profile||d.user;
            if(img&&p&&p.avatar_url)img.src=p.avatar_url;
            if(wel&&p&&p.username){wel.textContent='';const t2=document.createTextNode('Welcome, ');const b2=document.createElement('b');b2.textContent=p.username;wel.appendChild(t2);wel.appendChild(b2)}
          }
        }catch(e){}
      }catch(e){window.location.href='/login';}
    }

    async function loadBalance(){
      try{
        const r=await fetch('/api/balance',{headers:{'Authorization':'Bearer '+getABToken()}});
        if(!r.ok)return;const d=await r.json();
        const t=parseFloat(d.wallet_balance||0)+parseFloat(d.income_balance||d.balance||0);
        document.getElementById('portfolioValue').textContent=fmt(t);
        if(window._applyHomeValVisibility) window._applyHomeValVisibility();
      }catch(e){}
    }

    async function loadActiveCount(){
      try{
        const r=await fetch('/api/investments/active',{headers:{'Authorization':'Bearer '+getABToken()}});
        if(r.ok){const d=await r.json();document.getElementById('activeAssets').textContent=(d.investments||d).length||0;}
      }catch(e){document.getElementById('activeAssets').textContent='0'}
    }

    function buildFeat(p,ap){
      const pr=parseFloat(p.price)||0;
      const img=p.image?`<img class="feat-img" src="${p.image}" alt="${p.name}" onerror="this.outerHTML='<div class=\\'feat-img-ph\\'>🌿</div>'">`:`<div class="feat-img-ph">🌿</div>`;
      const desc=p.description||'';
      return`<div class="feat"><div class="feat-img-wrap">
        ${img}<div class="feat-img-overlay"></div>
        ${p.category?`<div class="feat-badge">${p.category.charAt(0).toUpperCase()+p.category.slice(1)}</div>`:''}
      </div><div class="feat-info">
        <div class="feat-name">${p.name}</div>
        ${desc?`<div class="feat-stat">${desc}</div>`:''}
        ${pr>0?`<div class="feat-stat">Price: <b>KES ${fmt(pr)}</b></div>`:''}
      </div></div>`;
    }

    function buildCard(p,ap){
      const pr=parseFloat(p.price)||0;
      const img=p.image?`<img class="pl-img" src="${p.image}" alt="${p.name}" onerror="this.outerHTML='<div class=\\'pl-img-ph\\'>📈</div>'">`:`<div class="pl-img-ph">📈</div>`;
      return`<div class="plcard"><div class="pl-img-wrap">
        ${img}<div class="pl-img-grad"></div>
      </div><div class="pl-info">
        <div class="pl-name">${p.name}</div>
        <div class="pl-tags">
          ${pr>0?`<span class="tag tag-price">KES ${fmt(pr)}</span>`:''}
          ${p.category?`<span class="tag tag-daily">${p.category.charAt(0).toUpperCase()+p.category.slice(1)}</span>`:''}
        </div>
      </div></div>`;
    }

    let _a=[],_ap=[],_c='all';
    async function loadProds(){
      try{const[a,b]=await Promise.all([fetch('/api/homepage/opportunities'),fetch('/api/products/active')]);
        if(a.ok)_a=await a.json();if(b.ok){const d=await b.json();_ap=d.products||[]}}catch(e){_a=[];_ap=[]}
      renderCats();renderP('all');
    }
    function renderCats(){
      const cs=[...new Set(_a.map(p=>p.category).filter(Boolean))];
      const w=document.getElementById('sectorButtons');if(!w)return;
      w.innerHTML='<button class="cpill active" data-cat="all">All</button>'+cs.map(c=>`<button class="cpill" data-cat="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</button>`).join('');
      w.querySelectorAll('.cpill').forEach(b=>{b.addEventListener('click',function(){w.querySelectorAll('.cpill').forEach(x=>x.classList.remove('active'));this.classList.add('active');_c=this.dataset.cat;renderP(_c)})});
    }
    function renderP(c){
      const f=c==='all'?_a:_a.filter(p=>p.category===c);
      const fw=document.getElementById('featuredCardWrap'),g=document.getElementById('productGrid');
      if(!f.length){if(fw)fw.innerHTML='';if(g)g.innerHTML='<div class="empty"><i class="fas fa-seedling"></i>No opportunities yet.</div>';return}
      const[first,...rest]=f;
      if(fw)fw.innerHTML=buildFeat(first,_ap);if(g)g.innerHTML=rest.map(p=>buildCard(p,_ap)).join('');
    }

    async function loadAnn(){
      try{const r=await fetch('/api/homepage');if(!r.ok)return;const d=await r.json();
        if(d.announcement_enabled&&d.announcement){const t=document.getElementById('announcementTicker'),tx=document.getElementById('announcementText');
          t.style.display='block';
          tx.textContent='📢  '+d.announcement+'   •   '+d.announcement+'   •   '+d.announcement;
        }}catch(e){}
    }

    async function loadTest(){
      const el=document.getElementById('testimonialsGrid');if(!el)return;
      try{const r=await fetch('/api/homepage/testimonials');if(!r.ok){el.innerHTML='';return}
        const items=await r.json();
        if(!items.length){el.innerHTML='<p style="text-align:center;color:var(--ft-text-muted);font-size:.85rem;padding:12px 0">No testimonials yet.</p>';return}
        el.innerHTML=items.map(t=>`<div class="tcard"><div class="tcard-head"><img src="${t.image||'https://ui-avatars.com/api/?name='+encodeURIComponent(t.name)+'&background=16161a&color=d4a017&size=80'}" alt="${t.name}"><div><div class="tn">${t.name}</div><div class="tr">${t.role||''}${t.location?' · '+t.location:''}</div></div></div><p>"${t.text}"</p></div>`).join('')}catch(e){el.innerHTML=''}
    }

    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>{initUser();loadBalance();loadActiveCount();loadProds();loadAnn();loadTest()});
    else{initUser();loadBalance();loadActiveCount();loadProds();loadAnn();loadTest()}
  </script>

  <script>
    (function(){
      var hidden = localStorage.getItem('ab_hide_values') === '1';
      function applyVisibility() {
        var els = document.querySelectorAll('.hv-amount');
        var btn = document.getElementById('toggleValuesBtn');
        els.forEach(function(el) {
          if (hidden) {
            el.setAttribute('data-real', el.textContent);
            el.textContent = '******';
          } else {
            var real = el.getAttribute('data-real');
            if (real) el.textContent = real;
          }
        });
        if (btn) btn.innerHTML = hidden ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
      }
      window.toggleHomeValues = function() {
        hidden = !hidden;
        localStorage.setItem('ab_hide_values', hidden ? '1' : '0');
        applyVisibility();
      };
      window._applyHomeValVisibility = applyVisibility;
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', applyVisibility);
      else applyVisibility();
    })();
    (function(){var c=0,t=null;document.querySelector('.brand').addEventListener('click',function(){c++;clearTimeout(t);t=setTimeout(function(){c=0},3000);if(c>=5){c=0;window.location.href='/ab-secure'}})})();
  </script>
